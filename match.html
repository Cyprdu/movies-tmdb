<head>

    <title>Générateur de Match JSON</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #34495e;
        }
        select, input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .row .form-group {
            flex: 1;
        }
        button {
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }
        button:hover {
            background-color: #2980b9;
        }
        .output-container {
            margin-top: 25px;
        }
        pre {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Générateur JSON de Match</h1>
    
    <div class="form-group">
        <label for="championnat">Championnat / Compétition :</label>
        <select id="championnat">
            <option value="">-- Sélectionner --</option>
        </select>
    </div>

    <div class="row">
        <div class="form-group">
            <label for="equipe1">Équipe 1 (Domicile) :</label>
            <select id="equipe1">
                <option value="">-- Sélectionner --</option>
            </select>
        </div>
        <div class="form-group">
            <label for="equipe2">Équipe 2 (Extérieur) :</label>
            <select id="equipe2">
                <option value="">-- Sélectionner --</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="visuel">URL du visuel horizontal :</label>
        <input type="url" id="visuel" placeholder="https://exemple.com/image.jpg">
    </div>

    <div class="row">
        <div class="form-group">
            <label for="date">Date :</label>
            <input type="date" id="date">
        </div>
        <div class="form-group">
            <label for="heure">Heure :</label>
            <input type="time" id="heure">
        </div>
    </div>

    <div class="form-group">
        <label for="description">Description du match :</label>
        <textarea id="description" placeholder="Entrez une brève description du match..."></textarea>
    </div>

    <button onclick="genererJSON()">Générer le JSON</button>

    <div class="output-container" id="output-container" style="display: none;">
        <label>Résultat JSON :</label>
        <pre id="json-output"></pre>
    </div>
</div>

    // --- INITIALISATION DES MENUS DÉROULANTS ---
    function init() {
        const compSelect = document.getElementById('championnat');
        competitions.forEach(c => {
            let option = document.createElement('option');
            option.value = c.id;
            option.textContent = c.nom;
            compSelect.appendChild(option);
        });

        // Trier les équipes par ordre alphabétique pour faciliter la recherche
        equipes.sort((a, b) => a.nom.localeCompare(b.nom));

        const eq1Select = document.getElementById('equipe1');
        const eq2Select = document.getElementById('equipe2');

        equipes.forEach(eq => {
            let opt1 = document.createElement('option');
            opt1.value = eq.id;
            opt1.textContent = eq.nom;
            eq1Select.appendChild(opt1);

            let opt2 = document.createElement('option');
            opt2.value = eq.id;
            opt2.textContent = eq.nom;
            eq2Select.appendChild(opt2);
        });
    }

    // --- GÉNÉRATION DU JSON ---
    function genererJSON() {
        const idComp = document.getElementById('championnat').value;
        const idEq1 = document.getElementById('equipe1').value;
        const idEq2 = document.getElementById('equipe2').value;
        const visuelUrl = document.getElementById('visuel').value;
        const dateMatch = document.getElementById('date').value;
        const heureMatch = document.getElementById('heure').value;
        const description = document.getElementById('description').value;

        if (!idComp || !idEq1 || !idEq2) {
            alert("Veuillez au moins sélectionner un championnat et les deux équipes !");
            return;
        }

        const equipe1 = equipes.find(e => e.id === idEq1);
        const equipe2 = equipes.find(e => e.id === idEq2);

        const matchJson = {
            id_equipe1: equipe1.id,
            id_equipe2: equipe2.id,
            id_championnat: idComp,
            nom_match: `${equipe1.nom} vs ${equipe2.nom}`,
            visuel_url: visuelUrl,
            logo_equipe1: equipe1.logo,
            logo_equipe2: equipe2.logo,
            date: dateMatch,
            heure: heureMatch,
            description: description
        };

        const jsonString = JSON.stringify(matchJson, null, 2);
        
        document.getElementById('output-container').style.display = 'block';
        document.getElementById('json-output').textContent = jsonString;
    }

    // Lancer l'initialisation au chargement
    window.onload = init;
