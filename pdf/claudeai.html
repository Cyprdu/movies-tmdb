<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookForge — Générateur de Livrets A5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
:root{--ink:#0f0e0c;--paper:#faf8f4;--gold:#c9a84c;--gold-l:#e8c97a;--rust:#8b3a2a;--sage:#4a5c4e;--muted:#7a7060;--bdr:rgba(201,168,76,.2)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--paper);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}

/* HEADER */
header{position:relative;padding:3rem 4rem 2rem;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;overflow:hidden}
header::after{content:'';position:absolute;top:-80px;right:-80px;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.06) 0%,transparent 70%);pointer-events:none}
.logo-mark{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.35rem}
.logo-main{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(2.2rem,3.5vw,3.5rem);letter-spacing:-.02em;color:var(--paper);line-height:1}
.logo-badge{font-size:.58rem;letter-spacing:.25em;color:var(--gold);padding:.2em .55em;border:1px solid var(--gold);border-radius:2px;vertical-align:middle;margin-left:.3rem}
.tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:1rem;color:var(--muted);letter-spacing:.04em}

/* LANG */
.lang-bar{display:flex;gap:.3rem;align-items:center;position:relative;z-index:10;flex-shrink:0}
.lb{background:none;border:1px solid transparent;border-radius:4px;cursor:pointer;padding:.25rem .4rem;font-size:1.2rem;line-height:1;transition:all .2s;opacity:.45;filter:grayscale(70%)}
.lb:hover{opacity:.8;filter:grayscale(0);border-color:var(--bdr)}
.lb.on{opacity:1;filter:grayscale(0);border-color:var(--gold);background:rgba(201,168,76,.08)}

/* MAIN */
main{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 145px)}
.pl{padding:3rem 4rem;border-right:1px solid var(--bdr);display:flex;flex-direction:column;gap:2rem}
.pr{padding:3rem 4rem;display:flex;flex-direction:column;gap:2rem}
.slbl{font-size:.58rem;letter-spacing:.33em;text-transform:uppercase;color:var(--gold);margin-bottom:.9rem;display:flex;align-items:center;gap:.7rem}
.slbl::before{content:'';display:inline-block;width:16px;height:1px;background:var(--gold)}

/* DROP */
.dz{position:relative;border:1px solid rgba(201,168,76,.3);border-radius:4px;padding:2.8rem 2rem;text-align:center;cursor:pointer;transition:all .3s;background:rgba(201,168,76,.02);overflow:hidden}
.dz::before{content:'';position:absolute;inset:6px;border:1px dashed rgba(201,168,76,.14);border-radius:2px;pointer-events:none;transition:border-color .3s}
.dz:hover,.dz.dov{border-color:var(--gold);background:rgba(201,168,76,.05)}
.dz:hover::before,.dz.dov::before{border-color:rgba(201,168,76,.35)}
.di{width:44px;height:44px;margin:0 auto 1rem}
.di svg{width:100%;height:100%;stroke:var(--gold);stroke-width:1.2;fill:none}
.dt{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:var(--paper);margin-bottom:.35rem}
.ds{font-size:.68rem;letter-spacing:.07em;color:var(--muted);line-height:1.65}
.ds strong{color:var(--gold);font-weight:400}
#fi{display:none}

/* FILE INFO */
.finfo{display:none;align-items:center;gap:.9rem;padding:.9rem 1.3rem;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:3px;animation:sli .4s ease}
.finfo.vis{display:flex}
@keyframes sli{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.fiw{width:32px;height:32px;background:rgba(201,168,76,.1);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fiw svg{stroke:var(--gold);width:15px;height:15px}
.fdet{flex:1;min-width:0}
.fnm{font-size:.76rem;color:var(--paper);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.12rem}
.fmet{font-size:.6rem;color:var(--muted);letter-spacing:.05em}
.frm{cursor:pointer;color:var(--muted);padding:3px;border-radius:2px;transition:color .2s;background:none;border:none;font-size:.85rem;line-height:1}
.frm:hover{color:#d4836e}

/* SETTINGS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
.fd{display:flex;flex-direction:column;gap:.38rem}
.fd.full{grid-column:1/-1}
.fd label{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.fd select,.fd input[type="text"]{background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.2);color:var(--paper);font-family:'DM Mono',monospace;font-size:.74rem;padding:.6rem .85rem;border-radius:3px;outline:none;transition:border-color .25s;-webkit-appearance:none;cursor:pointer}
.fd select:focus,.fd input[type="text"]:focus{border-color:var(--gold)}
.fd select option{background:#1a1916}
.tg{display:flex;border:1px solid rgba(201,168,76,.2);border-radius:3px;overflow:hidden}
.tg label{flex:1;text-align:center;padding:.58rem .4rem;font-size:.63rem;letter-spacing:.07em;cursor:pointer;transition:all .2s;color:var(--muted);user-select:none}
.tg input[type="radio"]{display:none}
.tg input[type="radio"]:checked+label{background:rgba(201,168,76,.12);color:var(--gold)}
.cbrow{display:flex;align-items:center;gap:.65rem;cursor:pointer;font-size:.68rem;letter-spacing:.08em;color:var(--muted);transition:color .2s;user-select:none;padding:.35rem 0}
.cbrow:hover{color:var(--paper)}
.cbox{width:15px;height:15px;border:1px solid rgba(201,168,76,.3);border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:.6rem}
.cbrow.on .cbox{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold)}

/* IMPOSITION */
.imprev{background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.1);border-radius:4px;padding:1.3rem}
.pt{font-family:'Playfair Display',serif;font-size:.88rem;color:var(--paper);margin-bottom:.9rem;display:flex;align-items:center;justify-content:space-between}
.pt span{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.12em;color:var(--muted)}
.sdiag{display:flex;flex-direction:column;gap:.35rem;max-height:190px;overflow-y:auto}
.sdiag::-webkit-scrollbar{width:3px}
.sdiag::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:2px}
.sr{display:grid;grid-template-columns:50px 1fr 1fr;gap:.35rem;align-items:center;font-size:.6rem;padding:.32rem .48rem;background:rgba(255,255,255,.02);border-radius:2px;transition:background .2s}
.sr:hover{background:rgba(201,168,76,.04)}
.srl{color:var(--muted);letter-spacing:.08em}
.sp{display:flex;align-items:center;justify-content:center;gap:.25rem}
.pb{display:inline-flex;align-items:center;justify-content:center;width:24px;height:32px;border:1px solid rgba(201,168,76,.25);border-radius:2px;font-size:.65rem;color:var(--paper);background:rgba(201,168,76,.05);transition:all .2s}
.pb:hover{border-color:var(--gold);background:rgba(201,168,76,.1)}
.ssep{display:flex;align-items:center;gap:.35rem;color:rgba(201,168,76,.45);font-size:.52rem;letter-spacing:.13em;margin:.12rem 0}
.ssep::before,.ssep::after{content:'';flex:1;height:1px;background:rgba(201,168,76,.08)}

/* BUTTONS */
.bpri{width:100%;padding:.95rem 2rem;background:var(--gold);color:var(--ink);font-family:'DM Mono',monospace;font-size:.68rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;border:none;border-radius:3px;cursor:pointer;position:relative;overflow:hidden;transition:all .3s}
.bpri:hover:not(:disabled){background:var(--gold-l);transform:translateY(-1px);box-shadow:0 8px 28px rgba(201,168,76,.25)}
.bpri:disabled{opacity:.3;cursor:not-allowed;transform:none}
.bpri.ld{color:transparent}
.bpri.ld::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:15px;height:15px;border:2px solid var(--ink);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.bout{width:100%;padding:.85rem 2rem;background:transparent;color:var(--gold);font-family:'DM Mono',monospace;font-size:.68rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;border:1px solid var(--gold);border-radius:3px;cursor:pointer;text-decoration:none;text-align:center;transition:all .3s;display:none;animation:sli .4s ease}
.bout.vis{display:block}
.bout:hover{background:rgba(201,168,76,.07);box-shadow:0 4px 18px rgba(201,168,76,.1)}
.bwiz{width:100%;padding:.85rem 2rem;background:rgba(74,92,78,.12);color:#8aab8f;font-family:'DM Mono',monospace;font-size:.68rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;border:1px solid rgba(74,92,78,.28);border-radius:3px;cursor:pointer;transition:all .3s;display:none;animation:sli .4s ease}
.bwiz.vis{display:block}
.bwiz:hover{background:rgba(74,92,78,.22);border-color:rgba(74,92,78,.5)}

/* STATUS */
.sp-status{display:none;padding:.9rem 1.3rem;border-radius:3px;font-size:.68rem;letter-spacing:.05em;animation:sli .3s ease;line-height:1.55}
.sp-status.vis{display:block}
.sp-status.inf{background:rgba(74,92,78,.1);border:1px solid rgba(74,92,78,.28);color:#8aab8f}
.sp-status.ok{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.23);color:var(--gold)}
.sp-status.err{background:rgba(139,58,42,.1);border:1px solid rgba(139,58,42,.28);color:#d4836e}
.pgb{height:2px;background:rgba(255,255,255,.05);border-radius:1px;margin-top:.6rem;overflow:hidden;display:none}
.pgb.vis{display:block}
.pgf{height:100%;background:var(--gold);border-radius:1px;transition:width .4s ease;width:0%}

/* RIGHT */
.expl h2{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,2vw,1.9rem);font-weight:700;line-height:1.2;color:var(--paper);margin-bottom:.65rem}
.expl h2 em{font-style:italic;color:var(--gold)}
.expl p{font-family:'Cormorant Garamond',serif;font-size:.92rem;font-weight:300;color:var(--muted);line-height:1.8;margin-bottom:1.4rem}
.a4vis{position:relative;background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.1);border-radius:6px;padding:1.3rem;overflow:hidden}
.a4vis::before{content:'IMPOSITION';position:absolute;top:.7rem;right:1.1rem;font-size:.48rem;letter-spacing:.28em;color:rgba(201,168,76,.18)}
.a4s{width:100%;aspect-ratio:297/210;border:1.5px solid rgba(201,168,76,.38);border-radius:3px;display:grid;grid-template-columns:1fr 1fr;position:relative;background:rgba(255,255,255,.01)}
.a4s::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(201,168,76,.28);z-index:2}
.a4p{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.22rem;padding:.7rem}
.pln{font-family:'Playfair Display',serif;font-size:clamp(1rem,1.8vw,1.6rem);font-weight:700;color:var(--paper);line-height:1}
.plt{font-size:.48rem;letter-spacing:.17em;color:var(--gold);text-transform:uppercase}
.specs{display:grid;grid-template-columns:repeat(3,1fr);gap:.65rem}
.si{padding:.85rem;background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.09);border-radius:3px;text-align:center}
.sn{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;color:var(--paper);line-height:1;margin-bottom:.22rem}
.sl{font-size:.54rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}

/* FOOTER */
footer{border-top:1px solid rgba(201,168,76,.09);padding:1.1rem 4rem;display:flex;align-items:center;justify-content:space-between}
.fn{font-size:.58rem;letter-spacing:.07em;color:rgba(122,112,96,.4)}
.ftc{display:flex;gap:.7rem}
.tb{font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(201,168,76,.28);padding:.18em .48em;border:1px solid rgba(201,168,76,.1);border-radius:2px}

/* ══ MODAL ══ */
.moverlay{position:fixed;inset:0;background:rgba(8,7,6,.93);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px);padding:1.5rem}
.moverlay.open{display:flex}
.modal{background:#141310;border:1px solid rgba(201,168,76,.18);border-radius:8px;width:100%;max-width:820px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;position:relative;box-shadow:0 40px 90px rgba(0,0,0,.75)}
.mhdr{padding:1.8rem 2.2rem 1.4rem;border-bottom:1px solid rgba(201,168,76,.1);flex-shrink:0}
.mtitle{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--paper);margin-bottom:.25rem}
.msub{font-size:.62rem;letter-spacing:.13em;color:var(--muted)}
.mclose{position:absolute;top:1.4rem;right:2rem;background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;transition:color .2s;padding:.3rem}
.mclose:hover{color:var(--paper)}
.mbody{flex:1;overflow-y:auto;padding:1.8rem 2.2rem}
.mbody::-webkit-scrollbar{width:3px}
.mbody::-webkit-scrollbar-thumb{background:rgba(201,168,76,.28);border-radius:2px}
.mfoot{padding:1.3rem 2.2rem;border-top:1px solid rgba(201,168,76,.1);display:flex;gap:.8rem;justify-content:flex-end;flex-shrink:0}

/* STEP INDICATOR */
.stind{display:flex;align-items:center;gap:0;margin-bottom:1.8rem}
.std{width:26px;height:26px;border-radius:50%;border:1px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;font-size:.58rem;color:var(--muted);transition:all .4s;flex-shrink:0}
.std.act{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.09)}
.std.dn{border-color:var(--sage);color:#8aab8f;background:rgba(74,92,78,.12)}
.stl{flex:1;height:1px;background:rgba(201,168,76,.09);transition:background .4s}
.stl.dn{background:rgba(74,92,78,.35)}

/* WIZARD STEPS */
.ws{display:none;animation:fdup .4s ease}
.ws.act{display:block}
@keyframes fdup{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.wq{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--paper);margin-bottom:.4rem}
.wh{font-size:.66rem;color:var(--muted);letter-spacing:.05em;line-height:1.55;margin-bottom:1.4rem}

/* CHOICE CARDS */
.cc{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:1.3rem}
.ccard{border:1px solid rgba(201,168,76,.13);border-radius:6px;padding:1.3rem;cursor:pointer;transition:all .3s;text-align:center;background:rgba(255,255,255,.02)}
.ccard:hover{border-color:var(--gold);background:rgba(201,168,76,.05)}
.ccard.sel{border-color:var(--gold);background:rgba(201,168,76,.08)}
.cico{font-size:1.9rem;margin-bottom:.6rem;display:block}
.ctit{font-family:'Playfair Display',serif;font-size:.92rem;color:var(--paper);margin-bottom:.25rem}
.cdesc{font-size:.6rem;color:var(--muted);letter-spacing:.04em;line-height:1.45}

/* PRINTER LIST */
.pl-list{display:flex;flex-direction:column;gap:.55rem;margin-bottom:1.3rem;max-height:210px;overflow-y:auto}
.pl-list::-webkit-scrollbar{width:3px}
.pl-list::-webkit-scrollbar-thumb{background:rgba(201,168,76,.28)}
.pi{display:flex;align-items:center;gap:.9rem;padding:.85rem 1.1rem;border:1px solid rgba(201,168,76,.11);border-radius:4px;cursor:pointer;transition:all .25s;background:rgba(255,255,255,.02)}
.pi:hover{border-color:var(--gold);background:rgba(201,168,76,.04)}
.pi.sel{border-color:var(--gold);background:rgba(201,168,76,.08)}
.pio{font-size:1.35rem;flex-shrink:0}
.pin{font-size:.76rem;color:var(--paper)}
.pid{font-size:.58rem;color:var(--muted);letter-spacing:.04em;margin-top:.12rem}
.pbdg{font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;padding:.18em .45em;border-radius:2px;margin-left:auto;flex-shrink:0}
.pbdg.dup{background:rgba(74,92,78,.18);border:1px solid rgba(74,92,78,.28);color:#8aab8f}
.pbdg.sim{background:rgba(139,58,42,.09);border:1px solid rgba(139,58,42,.2);color:#d4836e}

/* INSTRUCTION STAGE */
.istage{background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.09);border-radius:6px;padding:1.2rem;min-height:240px;position:relative;overflow:hidden;margin-bottom:1.3rem}
.scene{position:relative;width:100%;height:210px}

/* Printer SVG */
.psvg{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:150px}
.pbody{fill:#1e1c19;stroke:rgba(201,168,76,.38);stroke-width:1}
.pslot{fill:none;stroke:rgba(201,168,76,.48);stroke-width:1.5}
.plight{fill:var(--gold);animation:bl 1.5s ease-in-out infinite}
@keyframes bl{0%,100%{opacity:.25}50%{opacity:1}}

/* Sheet cards */
.acs{position:absolute;border:1px solid rgba(201,168,76,.28);border-radius:2px;background:rgba(15,14,12,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.25rem;font-size:.56rem;color:var(--muted);letter-spacing:.07em;overflow:hidden}
.acs .spn{font-family:'Playfair Display',serif;font-size:.88rem;color:var(--paper);line-height:1}
.acs .sfl{font-size:.46rem;letter-spacing:.13em;color:var(--gold);text-transform:uppercase}

/* FLIP */
.flipsc{display:flex;align-items:center;justify-content:center;gap:2.5rem;padding:.8rem;height:100%}
.fcrd{perspective:600px;width:110px;height:78px}
.fcrd-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .8s ease}
.fcrd.flp .fcrd-inner{transform:rotateY(180deg)}
.ff{position:absolute;inset:0;backface-visibility:hidden;border:1px solid rgba(201,168,76,.28);border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.25rem;font-size:.58rem}
.ff-f{background:rgba(201,168,76,.05)}
.ff-b{background:rgba(201,168,76,.02);transform:rotateY(180deg);border-style:dashed;border-color:rgba(201,168,76,.14)}
.farr{font-size:1.4rem;color:rgba(201,168,76,.45);align-self:center;animation:ap 1.2s ease-in-out infinite}
@keyframes ap{0%,100%{transform:translateX(0);opacity:.45}50%{transform:translateX(4px);opacity:1}}

/* INSTR */
.itxt{font-size:.7rem;color:var(--paper);line-height:1.55;letter-spacing:.04em}
.itxt strong{color:var(--gold)}
.iwarn{display:flex;align-items:flex-start;gap:.6rem;padding:.75rem .95rem;background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.14);border-radius:3px;margin-top:.75rem;font-size:.63rem;color:var(--gold);letter-spacing:.04em;line-height:1.5}

/* SUMMARY */
.slist{display:flex;flex-direction:column;gap:.7rem}
.sitem{display:flex;align-items:flex-start;gap:.9rem;padding:.85rem 1rem;background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.07);border-radius:4px;transition:all .3s}
.sitem.cur{border-color:var(--gold);background:rgba(201,168,76,.05)}
.sitem.dn2{border-color:rgba(74,92,78,.28);background:rgba(74,92,78,.05)}
.snum{width:22px;height:22px;border-radius:50%;border:1px solid rgba(201,168,76,.28);display:flex;align-items:center;justify-content:center;font-size:.58rem;color:var(--muted);flex-shrink:0;margin-top:.1rem}
.sitem.cur .snum{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.09)}
.sitem.dn2 .snum{border-color:rgba(74,92,78,.38);color:#8aab8f;background:rgba(74,92,78,.13)}
.sct{font-size:.73rem;color:var(--paper);margin-bottom:.18rem;letter-spacing:.04em}
.scd{font-size:.6rem;color:var(--muted);letter-spacing:.04em;line-height:1.45}

/* THUMBS */
.trow{display:flex;gap:.45rem;flex-wrap:wrap;margin-top:.75rem}
.thb{width:42px;height:60px;border:1px solid rgba(201,168,76,.2);border-radius:2px;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--muted);flex-shrink:0;overflow:hidden;position:relative}
.thb canvas,.thb img{width:100%;height:100%;object-fit:cover}
.thb-n{position:absolute;bottom:2px;right:2px;font-size:.42rem;color:rgba(201,168,76,.55)}
.thb.blk{border-style:dashed;border-color:rgba(201,168,76,.1)}

/* spin inline */
.spi{display:inline-block;width:11px;height:11px;border:1.5px solid rgba(201,168,76,.28);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.35rem}

/* WIZ BUTTONS */
.bwb{padding:.7rem 1.5rem;font-family:'DM Mono',monospace;font-size:.65rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;border-radius:3px;cursor:pointer;transition:all .25s}
.bwp{background:var(--gold);color:var(--ink);border:none}
.bwp:hover:not(:disabled){background:var(--gold-l)}
.bwp:disabled{opacity:.3;cursor:not-allowed}
.bwg{background:transparent;color:var(--muted);border:1px solid rgba(201,168,76,.18)}
.bwg:hover{color:var(--paper);border-color:rgba(201,168,76,.38)}

@media(max-width:860px){
  main{grid-template-columns:1fr}
  .pl{border-right:none;border-bottom:1px solid var(--bdr)}
  header,.pl,.pr,footer{padding-left:1.5rem;padding-right:1.5rem}
  .cc{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-mark">
      <span class="logo-main">BookForge</span>
      <span class="logo-badge">A5 IMPOSITION</span>
    </div>
    <p class="tagline" data-i18n="tagline">Transformez votre PDF en livret imprimable — imposition professionnelle automatique</p>
  </div>
  <div class="lang-bar" id="lbar">
    <button class="lb on" data-lang="fr" title="Français">🇫🇷</button>
    <button class="lb" data-lang="en" title="English">🇬🇧</button>
    <button class="lb" data-lang="de" title="Deutsch">🇩🇪</button>
    <button class="lb" data-lang="es" title="Español">🇪🇸</button>
    <button class="lb" data-lang="it" title="Italiano">🇮🇹</button>
    <button class="lb" data-lang="ru" title="Русский">🇷🇺</button>
  </div>
</header>

<main>
  <div class="pl">

    <div>
      <div class="slbl" data-i18n="s_source"></div>
      <div class="dz" id="dz">
        <input type="file" id="fi" accept=".pdf">
        <div class="di"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg></div>
        <div class="dt" data-i18n="dropTitle"></div>
        <div class="ds" data-i18n="dropSub"></div>
      </div>
      <div class="finfo" id="finfo">
        <div class="fiw"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <div class="fdet"><div class="fnm" id="fnm">—</div><div class="fmet" id="fmet">—</div></div>
        <button class="frm" id="frm">✕</button>
      </div>
    </div>

    <div>
      <div class="slbl" data-i18n="s_config"></div>
      <div class="sg">
        <div class="fd">
          <label data-i18n="bindingLabel"></label>
          <select id="bind">
            <option value="left" data-i18n="bindLeft"></option>
            <option value="right" data-i18n="bindRight"></option>
          </select>
        </div>
        <div class="fd">
          <label data-i18n="paddingLabel"></label>
          <select id="padmode">
            <option value="blank" data-i18n="paddingBlank"></option>
            <option value="none" data-i18n="paddingNone"></option>
          </select>
        </div>
        <div class="fd full">
          <label data-i18n="titleLabel"></label>
          <input type="text" id="btitle" data-i18n-ph="titlePh">
        </div>
        <div class="fd full">
          <div class="cbrow on" id="foldtog"><div class="cbox">✓</div><span data-i18n="foldLine"></span></div>
        </div>
      </div>
    </div>

    <div>
      <div class="slbl" data-i18n="s_imposition"></div>
      <div class="imprev">
        <div class="pt"><span data-i18n="pageOrder"></span><span id="sclbl">—</span></div>
        <div class="sdiag" id="sdiag"><div style="text-align:center;padding:1.3rem;font-size:.63rem;color:var(--muted)" data-i18n="loadHint"></div></div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:.6rem">
      <div class="sp-status" id="sstat"></div>
      <div class="pgb" id="pgb"><div class="pgf" id="pgf"></div></div>
      <button class="bpri" id="bgen" disabled data-i18n="generate"></button>
      <a class="bout" id="bdl" download="livret-a5.pdf" data-i18n="download"></a>
      <button class="bwiz" id="bwiz" data-i18n="printWizard"></button>
    </div>

  </div>

  <div class="pr">
    <div class="expl">
      <p class="slbl" data-i18n="s_how"></p>
      <h2><span data-i18n="exT1"></span> <em data-i18n="exT2"></em><br><span data-i18n="exT3"></span></h2>
      <p data-i18n="exBody"></p>
      <div class="a4vis">
        <div class="a4s">
          <div class="a4p"><div class="pln" id="vl">16</div><div class="plt" data-i18n="vL"></div></div>
          <div class="a4p"><div class="pln" id="vr">1</div><div class="plt" data-i18n="vR"></div></div>
        </div>
        <div style="text-align:center;margin-top:.6rem;font-size:.56rem;color:var(--muted);letter-spacing:.09em" data-i18n="shCap"></div>
      </div>
    </div>
    <div class="specs">
      <div class="si"><div class="sn" id="spPg">—</div><div class="sl" data-i18n="spPages"></div></div>
      <div class="si"><div class="sn" id="spSh">—</div><div class="sl" data-i18n="spSheets"></div></div>
      <div class="si"><div class="sn" id="spTo">—</div><div class="sl" data-i18n="spTotal"></div></div>
    </div>
  </div>
</main>

<footer>
  <div class="fn" data-i18n="footNote"></div>
  <div class="ftc"><span class="tb">pdf-lib 1.17</span><span class="tb">A5 · A4</span><span class="tb">Imposition</span></div>
</footer>

<!-- ══════ WIZARD MODAL ══════ -->
<div class="moverlay" id="wmod">
  <div class="modal">
    <div class="mhdr">
      <div class="mtitle" data-i18n="wizTitle"></div>
      <div class="msub" data-i18n="wizSub"></div>
      <button class="mclose" id="wclose">✕</button>
    </div>
    <div class="mbody">
      <div class="stind" id="stind"></div>

      <!-- STEP 0: duplex? -->
      <div class="ws act" id="ws0">
        <div class="wq" data-i18n="wq0"></div>
        <div class="wh" data-i18n="wh0"></div>
        <div class="cc">
          <div class="ccard" id="cduplex">
            <span class="cico">🖨️</span>
            <div class="ctit" data-i18n="dAuto"></div>
            <div class="cdesc" data-i18n="dAutoD"></div>
          </div>
          <div class="ccard" id="cmanual">
            <span class="cico">🤲</span>
            <div class="ctit" data-i18n="dMan"></div>
            <div class="cdesc" data-i18n="dManD"></div>
          </div>
        </div>
      </div>

      <!-- STEP 1: printer -->
      <div class="ws" id="ws1">
        <div class="wq" data-i18n="wq1"></div>
        <div class="wh" data-i18n="wh1"></div>
        <div class="pl-list" id="plist"></div>
        <div style="font-size:.58rem;color:var(--muted);letter-spacing:.04em;line-height:1.55" data-i18n="prNote"></div>
      </div>

      <!-- STEP 2: print front / duplex -->
      <div class="ws" id="ws2">
        <div class="wq" id="s2q"></div>
        <div class="wh" id="s2h"></div>
        <div class="istage" id="stg2"><div class="scene" id="sc2"></div></div>
        <div class="itxt" id="s2i"></div>
        <div class="iwarn" id="s2w" style="display:none"><span>⚠</span><span id="s2wt"></span></div>
      </div>

      <!-- STEP 3: flip -->
      <div class="ws" id="ws3">
        <div class="wq" data-i18n="wq3"></div>
        <div class="wh" data-i18n="wh3"></div>
        <div class="istage">
          <div class="flipsc" id="flipsc">
            <div>
              <div style="font-size:.52rem;letter-spacing:.13em;color:var(--muted);text-align:center;margin-bottom:.5rem" data-i18n="lBefore"></div>
              <div class="fcrd" id="fc1">
                <div class="fcrd-inner">
                  <div class="ff ff-f"><div style="font-family:'Playfair Display',serif;font-size:.88rem;color:var(--paper)" data-i18n="lRecto"></div><div style="font-size:.46rem;letter-spacing:.13em;color:var(--gold)">IMPRIMÉ</div></div>
                  <div class="ff ff-b"><div style="font-family:'Playfair Display',serif;font-size:.88rem;color:var(--muted)" data-i18n="lVerso"></div><div style="font-size:.46rem;letter-spacing:.13em;color:var(--muted)" data-i18n="lBlank"></div></div>
                </div>
              </div>
            </div>
            <div class="farr">→</div>
            <div>
              <div style="font-size:.52rem;letter-spacing:.13em;color:var(--gold);text-align:center;margin-bottom:.5rem" data-i18n="lAfter"></div>
              <div class="fcrd flp">
                <div class="fcrd-inner" style="transform:rotateY(180deg)">
                  <div class="ff ff-f"><div style="font-family:'Playfair Display',serif;font-size:.88rem;color:var(--paper)" data-i18n="lRecto"></div><div style="font-size:.46rem;letter-spacing:.13em;color:var(--gold)">DESSOUS</div></div>
                  <div class="ff ff-b"><div style="font-family:'Playfair Display',serif;font-size:.88rem;color:#8aab8f" data-i18n="lVerso"></div><div style="font-size:.46rem;letter-spacing:.13em;color:#8aab8f" data-i18n="lBlankUp"></div></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="iwarn"><span>💡</span><span data-i18n="flipI"></span></div>
        <div id="flipd" style="margin-top:.9rem;font-size:.63rem;color:var(--muted);letter-spacing:.04em;line-height:1.55"></div>
      </div>

      <!-- STEP 4: print back / done -->
      <div class="ws" id="ws4">
        <div class="wq" id="s4q"></div>
        <div class="wh" id="s4h"></div>
        <div class="istage" id="stg4"><div class="scene" id="sc4"></div></div>
        <div class="slist" id="sumlist"></div>
      </div>

    </div>
    <div class="mfoot">
      <button class="bwb bwg" id="wprev" data-i18n="lPrev"></button>
      <button class="bwb bwp" id="wnext" data-i18n="lNext"></button>
    </div>
  </div>
</div>

let lang='fr';
const t=k=>(TX[lang]&&TX[lang][k]!==undefined)?TX[lang][k]:(TX.fr[k]||k);

function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(TX[lang]&&TX[lang][k]!==undefined)el.innerHTML=TX[lang][k];else if(TX.fr[k])el.innerHTML=TX.fr[k];});
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{const k=el.getAttribute('data-i18n-ph');el.placeholder=t(k);});
  if(totalPages) updateImp();
  else { const d=document.getElementById('sdiag'); if(d) d.innerHTML=`<div style="text-align:center;padding:1.3rem;font-size:.63rem;color:var(--muted)">${t('loadHint')}</div>`; }
}

document.getElementById('lbar').addEventListener('click',e=>{

  lang=b.dataset.lang;
  document.querySelectorAll('.lb').forEach(x=>x.classList.toggle('on',x.dataset.lang===lang));

});

async function handleFile(file){
  pdfFile=file; showSt('Lecture…','inf');
  const r=new FileReader();
  r.onerror=()=>{showSt('Impossible de lire le fichier.','err');resetF();};
  r.onload=async e=>{
    try{
      // Keep a plain ArrayBuffer copy for pdf.js (needs fresh view), Uint8Array for pdf-lib
      const buf=e.target.result;
      if(!buf||buf.byteLength===0){showSt('Fichier vide ou illisible.','err');resetF();return;}
      pdfBytes=new Uint8Array(buf.slice(0)); // copy for pdf-lib
      // Validate PDF header
      const sig=new Uint8Array(buf,0,Math.min(10,buf.byteLength));
      const hdr=String.fromCharCode(...sig);
      if(!hdr.includes('%PDF')){showSt('Ce fichier ne semble pas être un PDF valide.','err');resetF();return;}
      const doc=await PDFDocument.load(pdfBytes,{ignoreEncryption:true,updateMetadata:false});
      totalPages=doc.getPageCount();
      const kb=Math.round(file.size/1024);
      fnm.textContent=file.name;
      fmet.textContent=`${totalPages} pages · ${kb<1024?kb+' Ko':(kb/1024).toFixed(1)+' Mo'}`;
      finfo.classList.add('vis'); dz.style.display='none';
      updateImp(); sstat.classList.remove('vis'); bgen.disabled=false;
      renderThumbs();
    }catch(er){
      console.error(er);
      showSt('Erreur : '+er.message,'err');
      resetF();
    }
  };
  r.readAsArrayBuffer(file);
}
function resetF(){
  pdfFile=null;pdfBytes=null;totalPages=0;genUrl=null;thumbs=[];
  finfo.classList.remove('vis');dz.style.display='';fi.value='';
  bgen.disabled=true;bdl.classList.remove('vis');bwiz.classList.remove('vis');
  sstat.classList.remove('vis');pgb.classList.remove('vis');
  sdiag.innerHTML=`<div style="text-align:center;padding:1.3rem;font-size:.63rem;color:var(--muted)">${t('loadHint')}</div>`;
  sclbl.textContent='—';spPg.textContent='—';spSh.textContent='—';spTo.textContent='—';vl.textContent='16';vr.textContent='1';
}

async function renderThumbs(){
  if(!pdfBytes) return; thumbs=[];
  try{
    const pd=await pdfjsLib.getDocument({data:pdfBytes.slice(0)}).promise;
    for(let i=1;i<=Math.min(pd.numPages,50);i++){
      const pg=await pd.getPage(i); const vp=pg.getViewport({scale:.25});
      const c=document.createElement('canvas'); c.width=vp.width; c.height=vp.height;
      await pg.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
      thumbs[i-1]=c;
    }
  }catch(e){}
}

// ══════ IMPOSITION ══════
function computeOrder(n){
  const pad=Math.ceil(n/4)*4,sheets=[];
  let lo=1,hi=pad;
  while(lo<hi){sheets.push({r:[hi,lo],v:[lo+1,hi-1]});lo+=2;hi-=2;}
  return{sheets,pad};
}

function updateImp(){
  if(!totalPages) return;
  const{sheets,pad}=computeOrder(totalPages); const ns=sheets.length;
  spPg.textContent=totalPages; spSh.textContent=ns; spTo.textContent=pad;
  sclbl.textContent=ns+' feuille'+(ns>1?'s':'');
  vl.textContent=pad; vr.textContent='1';
  sdiag.innerHTML='';
  sheets.forEach((sh,i)=>{
    const sep=document.createElement('div'); sep.className='ssep'; sep.textContent=`Feuille ${i+1}`; sdiag.appendChild(sep);
    sdiag.appendChild(mkRow('Recto',sh.r[0],sh.r[1],totalPages));
    sdiag.appendChild(mkRow('Verso',sh.v[0],sh.v[1],totalPages));
  });
}

function mkRow(lbl,l,r,total){
  const row=document.createElement('div'); row.className='sr';
  const ll=document.createElement('div'); ll.className='srl'; ll.textContent=lbl;
  const lc=document.createElement('div'); lc.className='sp';
  const lb=document.createElement('div'); lb.className='pb'; lb.textContent=l>total?'—':l; if(l>total)lb.style.opacity='.3';
  lc.innerHTML='<span style="font-size:.48rem;color:var(--muted);margin-right:.2rem">◀</span>'; lc.appendChild(lb);
  const rc=document.createElement('div'); rc.className='sp';
  const rb=document.createElement('div'); rb.className='pb'; rb.textContent=r>total?'—':r; if(r>total)rb.style.opacity='.3';
  rc.appendChild(rb); rc.insertAdjacentHTML('beforeend','<span style="font-size:.48rem;color:var(--muted);margin-left:.2rem">▶</span>');
  row.appendChild(ll); row.appendChild(lc); row.appendChild(rc); return row;
}

bgen.addEventListener('click',genBooklet);
async function genBooklet(){
  if(!pdfBytes) return;
  bgen.classList.add('ld'); bgen.disabled=true;
  bdl.classList.remove('vis'); bwiz.classList.remove('vis');
  showSt('Initialisation…','inf'); setPg(5);
  try{
    const src=await PDFDocument.load(pdfBytes.slice(0),{ignoreEncryption:true,updateMetadata:false}); const n=src.getPageCount();
    const{sheets}=computeOrder(n); const out=await PDFDocument.create();
    const W=841.89,H=595.28,hw=W/2; let step=0; const tot=sheets.length*2;
    showSt('Calcul de l\'imposition…','inf'); setPg(15);
    for(const sh of sheets){
      await addPage(out,src,sh.r[0],sh.r[1],W,H,hw,n); step++; setPg(15+Math.round((step/tot)*75));
      await addPage(out,src,sh.v[0],sh.v[1],W,H,hw,n); step++; setPg(15+Math.round((step/tot)*75));
    }
    setPg(95);
    const ob=await out.save(); const blob=new Blob([ob],{type:'application/pdf'});
    genUrl=URL.createObjectURL(blob);
    const tit=document.getElementById('btitle').value.trim();
    bdl.href=genUrl; bdl.download=tit?tit.replace(/\s+/g,'-')+'-livret.pdf':'livret-a5.pdf';
    bdl.classList.add('vis'); bwiz.classList.add('vis');
    setPg(100); showSt(`✓ ${sheets.length} feuilles · ${n} pages utiles`,'ok');
  }catch(e){showSt('Erreur : '+e.message,'err');console.error(e);}
  finally{bgen.classList.remove('ld');bgen.disabled=false;}
}

async function addPage(out,src,lNum,rNum,W,H,hw,n){
  const pg=out.addPage([W,H]);
  async function draw(num,xOff){
    if(num>=1&&num<=n){
      const[emb]=await out.embedPdf(src,[num-1]);
      const sp=src.getPage(num-1); const{width:sw,height:sh}=sp.getSize();
      const s=Math.min(hw/sw,H/sh); const dw=sw*s,dh=sh*s;
      pg.drawPage(emb,{x:xOff+(hw-dw)/2,y:(H-dh)/2,width:dw,height:dh});
    }
  }
  await draw(lNum,0); await draw(rNum,hw);
  if(foldOn) pg.drawLine({start:{x:hw,y:0},end:{x:hw,y:H},thickness:.4,color:rgb(.75,.75,.75),dashArray:[4,4],dashPhase:0});
}

function buildStepIndicator(){

  });
}

// URLs for split PDFs
let rectoUrl=null, versoUrl=null, fullDuplexUrl=null;

async function buildSplitPdfs(){
  if(!pdfBytes) return;
  const src=await PDFDocument.load(pdfBytes.slice(0),{ignoreEncryption:true,updateMetadata:false});
  const n=src.getPageCount();
  const{sheets}=computeOrder(n);
  const W=841.89,H=595.28,hw=W/2;
  // Recto doc
  const rDoc=await PDFDocument.create();
  for(const sh of sheets) await addPage(rDoc,src,sh.r[0],sh.r[1],W,H,hw,n);
  rectoUrl=URL.createObjectURL(new Blob([await rDoc.save()],{type:'application/pdf'}));
  // Verso doc — reversed so after manual flip+stack the order is correct
  const vDoc=await PDFDocument.create();
  for(const sh of [...sheets].reverse()) await addPage(vDoc,src,sh.v[0],sh.v[1],W,H,hw,n);
  versoUrl=URL.createObjectURL(new Blob([await vDoc.save()],{type:'application/pdf'}));
  // Full duplex doc
  const dDoc=await PDFDocument.create();
  for(const sh of sheets){
    await addPage(dDoc,src,sh.r[0],sh.r[1],W,H,hw,n);
    await addPage(dDoc,src,sh.v[0],sh.v[1],W,H,hw,n);
  }
  fullDuplexUrl=URL.createObjectURL(new Blob([await dDoc.save()],{type:'application/pdf'}));
}

function printPdfUrl(url){
  let iframe=document.getElementById('_pf');
  if(iframe) iframe.remove();
  iframe=document.createElement('iframe');
  iframe.id='_pf';
  iframe.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0';
  document.body.appendChild(iframe);
  iframe.onload=()=>{
    try{ iframe.contentWindow.focus(); iframe.contentWindow.print(); }
    catch(e){ window.open(url,'_blank'); }
  };
  iframe.src=url;
}

function gotoStep(step){
  if(hasDuplex===true&&step===3&&wizStep===2) step=4;
  if(hasDuplex===true&&step===3&&wizStep===4) step=2;
  wizStep=Math.max(0,Math.min(4,step));
  document.querySelectorAll('.ws').forEach((el,i)=>el.classList.toggle('act',i===wizStep));
  const dots=document.querySelectorAll('.std'); const lines=document.querySelectorAll('.stl');
  dots.forEach((d,i)=>{d.classList.remove('act','dn');if(i<wizStep)d.classList.add('dn');else if(i===wizStep)d.classList.add('act');});
  lines.forEach((l,i)=>l.classList.toggle('dn',i<wizStep));
  wprev.style.display=wizStep===0?'none':'';
  wprev.innerHTML=t('lPrev');
  if(wizStep===2){
    wnext.innerHTML='\uD83D\uDDB6 Imprimer maintenant \u2192';
    wnext.onclick=async()=>{
      const btn=wnext; btn.disabled=true; btn.textContent='Génération…';
      await buildSplitPdfs();
      printPdfUrl(hasDuplex?fullDuplexUrl:rectoUrl);
      btn.disabled=false; btn.innerHTML='\u2713 Imprimé, suivant \u2192';
      btn.onclick=()=>gotoStep(wizStep+1);
    };
  }else if(wizStep===4&&!hasDuplex){
    wnext.innerHTML='\uD83D\uDDB6 Imprimer les versos \u2192';
    wnext.onclick=()=>{
      if(versoUrl) printPdfUrl(versoUrl);
      wnext.innerHTML='\u2713 Terminer';
      wnext.onclick=()=>wmod.classList.remove('open');
    };
  }else if(wizStep===4){
    wnext.innerHTML='\u2713 Terminer';
    wnext.onclick=()=>wmod.classList.remove('open');
  }else{
    wnext.innerHTML=t('lNext');
    wnext.onclick=()=>gotoStep(wizStep+1);
  }
  wnext.disabled=shouldDisable(wizStep);
  buildWizContent(wizStep);
}

function shouldDisable(s){
  if(s===0) return hasDuplex===null;
  return false;
}

function buildWizContent(step){
  if(step===0) buildS0();
  if(step===1) buildS1();
  if(step===2) buildS2();
  if(step===3) buildS3();
  if(step===4) buildS4();
}

function buildS0(){
  const cd=document.getElementById('cduplex'),cm=document.getElementById('cmanual');
  cd.classList.toggle('sel',hasDuplex===true); cm.classList.toggle('sel',hasDuplex===false);
  document.getElementById('ws0').querySelector('.wq').textContent=t('wq0');
  document.getElementById('ws0').querySelector('.wh').textContent=t('wh0');
  document.getElementById('ws0').querySelectorAll('.ctit')[0].textContent=t('dAuto');
  document.getElementById('ws0').querySelectorAll('.ctit')[1].textContent=t('dMan');
  document.getElementById('ws0').querySelectorAll('.cdesc')[0].textContent=t('dAutoD');
  document.getElementById('ws0').querySelectorAll('.cdesc')[1].textContent=t('dManD');
  cd.onclick=()=>{hasDuplex=true;cd.classList.add('sel');cm.classList.remove('sel');wnext.disabled=false;};
  cm.onclick=()=>{hasDuplex=false;cm.classList.add('sel');cd.classList.remove('sel');wnext.disabled=false;};
}

function buildS1(){
  document.getElementById('ws1').querySelector('.wq').textContent=t('wq1');
  document.getElementById('ws1').querySelector('.wh').textContent=t('wh1');
  document.getElementById('ws1').querySelectorAll('div')[document.getElementById('ws1').querySelectorAll('div').length-1].textContent=t('prNote');
}

function buildS2(){
  const{sheets}=computeOrder(totalPages);
  document.getElementById('s2q').textContent=hasDuplex?t('s2TD'):t('s2TM');
  document.getElementById('s2h').textContent=hasDuplex?t('s2HD'):t('s2HM');
  if(!hasDuplex){
    buildPrintAnim('sc2',sheets,'odd');
    document.getElementById('s2i').innerHTML=t('pi1')+'<br><br>'+t('pi1b');
    document.getElementById('s2w').style.display='flex';
    document.getElementById('s2wt').textContent=t('pw1');
  }else{
    buildDuplexAnim('sc2');
    document.getElementById('s2i').innerHTML=t('piD');
    document.getElementById('s2w').style.display='none';
  }
}

function buildS3(){
  document.getElementById('ws3').querySelector('.wq').textContent=t('wq3');
  document.getElementById('ws3').querySelector('.wh').textContent=t('wh3');
  const{sheets}=computeOrder(totalPages);
  document.getElementById('flipd').innerHTML=`<strong>${sheets.length} feuilles</strong> à retourner · La feuille 1 reste au-dessus.`;
  document.querySelectorAll('[data-i18n="lBefore"]').forEach(e=>e.textContent=t('lBefore'));
  document.querySelectorAll('[data-i18n="lAfter"]').forEach(e=>e.textContent=t('lAfter'));
  document.querySelectorAll('[data-i18n="lRecto"]').forEach(e=>e.textContent=t('lRecto'));
  document.querySelectorAll('[data-i18n="lVerso"]').forEach(e=>e.textContent=t('lVerso'));
  document.querySelectorAll('[data-i18n="lBlank"]').forEach(e=>e.textContent=t('lBlank'));
  document.querySelectorAll('[data-i18n="lBlankUp"]').forEach(e=>e.textContent=t('lBlankUp'));
  document.getElementById('ws3').querySelector('.iwarn span:last-child').textContent=t('flipI');
  // animate flip
  const fc=document.getElementById('fc1'); let flp=false;
  clearInterval(fc._iv); fc._iv=setInterval(()=>{flp=!flp;fc.classList.toggle('flp',flp);},1800);
}

function buildS4(){
  document.getElementById('s4q').textContent=hasDuplex?t('s4TD'):t('s4TM');
  document.getElementById('s4h').textContent=hasDuplex?t('s4HD'):t('s4HM');
  const{sheets}=computeOrder(totalPages);
  if(!hasDuplex){
    buildPrintAnim('sc4',sheets,'even');
  }else{
    buildFinAnim('sc4');
  }
  buildSummary(hasDuplex);
}

// ── ANIMATION BUILDERS ──
let atimers=[];
function clearAnim(){atimers.forEach(clearTimeout);atimers=[];}

function buildPrintAnim(scId,sheets,mode){
  const sc=document.getElementById(scId); sc.innerHTML='';
  // Printer
  const pd=document.createElement('div');
  pd.style.cssText='position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:145px';
  pd.innerHTML=`<svg viewBox="0 0 160 88" xmlns="http://www.w3.org/2000/svg">
    <rect x="8" y="28" width="144" height="52" rx="4" class="pbody"/>
    <rect x="28" y="16" width="104" height="20" rx="2" class="pbody"/>
    <rect x="48" y="50" width="64" height="4" rx="1" class="pslot"/>
    <circle cx="132" cy="40" r="4" class="plight"/>
    <text x="80" y="68" fill="rgba(201,168,76,.35)" font-size="6.5" text-anchor="middle" font-family="DM Mono,monospace" letter-spacing="1">PRINTER</text>
  </svg>`;
  sc.appendChild(pd);

  // Pages to show
  const pgs=mode==='odd'?
    sheets.map(s=>s.r).flat().filter(p=>p<=totalPages):
    sheets.map(s=>s.v).flat().filter(p=>p<=totalPages);
  const vis=Math.min(pgs.length,6);

  // Input stack (left)
  const inDiv=document.createElement('div');
  inDiv.style.cssText='position:absolute;left:8px;top:8px;width:110px';
  inDiv.innerHTML=`<div style="font-size:.5rem;letter-spacing:.11em;color:var(--muted);text-transform:uppercase;margin-bottom:.4rem">${mode==='odd'?'À imprimer':'Pile retournée'}</div>`;
  const inStack=document.createElement('div'); inStack.style.cssText='position:relative;height:85px';
  for(let i=0;i<vis;i++){
    const pg=pgs[i]; const s=document.createElement('div');
    s.style.cssText=`position:absolute;left:${i*4}px;top:${i*4}px;width:60px;height:43px;border:1px solid rgba(201,168,76,${i===0?'.4':'.15'});border-radius:2px;background:rgba(15,14,12,.9);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:default`;
    if(thumbs[pg-1]){const img=document.createElement('img');img.src=thumbs[pg-1].toDataURL();img.style.cssText='width:100%;height:100%;object-fit:cover;opacity:.65';s.appendChild(img);}
    else{s.innerHTML=`<span style="font-family:'Playfair Display',serif;font-size:.85rem;color:var(--paper)">${pg}</span>`;}
    const nb=document.createElement('span'); nb.style.cssText='position:absolute;bottom:1px;right:2px;font-size:.38rem;color:rgba(201,168,76,.5)'; nb.textContent='p'+pg; s.appendChild(nb);
    inStack.appendChild(s);
  }
  inDiv.appendChild(inStack); sc.appendChild(inDiv);

  // Output tray (right)
  const outDiv=document.createElement('div');
  outDiv.style.cssText='position:absolute;right:8px;top:8px;width:110px';
  outDiv.innerHTML=`<div style="font-size:.5rem;letter-spacing:.11em;color:var(--muted);text-transform:uppercase;margin-bottom:.4rem">Sortie imprimante</div><div id="${scId}-out" style="position:relative;height:85px;width:60px"></div>`;
  sc.appendChild(outDiv);

  // Animate
  clearAnim();
  const printOrder=[...pgs].reverse(); // last page printed last = first page on top
  let printed=0;
  function nextPrint(){
    if(printed>=Math.min(printOrder.length,6)) return;
    const pg=printOrder[printed];
    const s=document.createElement('div');
    s.style.cssText=`position:absolute;left:0;top:${printed*4}px;width:60px;height:43px;border:1px solid rgba(74,92,78,.38);border-radius:2px;background:rgba(15,14,12,.9);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .45s;overflow:hidden`;
    if(thumbs[pg-1]){const img=document.createElement('img');img.src=thumbs[pg-1].toDataURL();img.style.cssText='width:100%;height:100%;object-fit:cover;opacity:.65';s.appendChild(img);}
    else{s.innerHTML=`<span style="font-family:'Playfair Display',serif;font-size:.85rem;color:#8aab8f">${pg}</span>`;}
    const nb=document.createElement('span');nb.style.cssText='position:absolute;bottom:1px;right:2px;font-size:.38rem;color:rgba(138,171,143,.5)';nb.textContent='p'+pg;s.appendChild(nb);
    const out=document.getElementById(scId+'-out');
    if(out){out.appendChild(s);requestAnimationFrame(()=>s.style.opacity='1');}
    printed++;
    if(printed<Math.min(printOrder.length,6)) atimers.push(setTimeout(nextPrint,950));
    else{
      atimers.push(setTimeout(()=>{
        const topSheet=out&&out.querySelectorAll('div')[out.querySelectorAll('div').length-1];
        if(topSheet) topSheet.style.borderColor='var(--gold)';
      },500));
    }
  }
  atimers.push(setTimeout(nextPrint,500));
}

function buildDuplexAnim(scId){
  const sc=document.getElementById(scId); sc.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:center;height:100%;gap:2rem;flex-direction:column">
      <div style="font-size:2.8rem">🖨️</div>
      <div style="font-size:.7rem;color:var(--paper);letter-spacing:.04em;text-align:center;line-height:1.65;max-width:300px">${t('piD')}</div>
      <div style="display:flex;gap:.5rem;align-items:center;margin-top:.3rem">
        <div style="width:48px;height:34px;border:1px solid rgba(201,168,76,.38);border-radius:2px;background:rgba(201,168,76,.05);display:flex;align-items:center;justify-content:center;font-size:.58rem;color:var(--gold)">R</div>
        <div style="font-size:.9rem;color:rgba(201,168,76,.38)">⟺</div>
        <div style="width:48px;height:34px;border:1px solid rgba(201,168,76,.38);border-radius:2px;background:rgba(201,168,76,.05);display:flex;align-items:center;justify-content:center;font-size:.58rem;color:var(--gold)">V</div>
      </div>
    </div>`;
}

function buildFinAnim(scId){
  const sc=document.getElementById(scId); sc.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:.9rem">
      <div style="font-size:2.8rem;animation:fdup .5s ease">🎉</div>
      <div style="font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--paper);text-align:center;max-width:280px">${t('fin').replace('🎉 ','')}</div>
      <div style="display:flex;gap:.4rem;margin-top:.5rem">
        <div style="width:32px;height:46px;border:1px solid rgba(201,168,76,.28);border-radius:2px;background:rgba(201,168,76,.04);transform:rotate(-4deg)"></div>
        <div style="width:32px;height:46px;border:1px solid rgba(201,168,76,.28);border-radius:2px;background:rgba(201,168,76,.04)"></div>
        <div style="width:32px;height:46px;border:1px solid rgba(201,168,76,.28);border-radius:2px;background:rgba(201,168,76,.04);transform:rotate(4deg)"></div>
      </div>
    </div>`;
}

function buildSummary(isDuplex){
  const c=document.getElementById('sumlist'); c.innerHTML='';
  const steps=isDuplex?t('sumD'):t('sumM');
  if(!Array.isArray(steps)) return;
  steps.forEach((s,i)=>{
    const item=document.createElement('div'); item.className='sitem dn2';
    item.innerHTML=`<div class="snum">${i+1}</div><div><div class="sct">${s}</div></div>`;
    c.appendChild(item);
  });
}

// ── PRINTER DETECTION ──
// Web browsers don't expose a JS API to list printers.
// The real printer picker appears inside window.print() — the OS dialog.
// Step 1 just lets the user confirm their duplex capability; the actual
// printer selection happens naturally in the system print dialog.
function detectPrinters(){
  const list=document.getElementById('plist');
  list.innerHTML=`
    <div style="padding:1.2rem;background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.15);border-radius:4px;font-size:.68rem;color:var(--paper);line-height:1.7">
      <div style="font-family:'Playfair Display',serif;font-size:.95rem;margin-bottom:.6rem">🖨️ Sélection de l'imprimante</div>
      <div style="color:var(--muted);font-size:.63rem;line-height:1.6">
        Les navigateurs web ne permettent pas de lister les imprimantes réseau directement.<br><br>
        Lorsque vous cliquerez sur <strong style="color:var(--gold)">🖨 Imprimer maintenant</strong>, la <strong style="color:var(--gold)">boîte de dialogue d'impression système</strong> s'ouvrira — elle liste toutes vos imprimantes réseau réelles détectées par votre OS (Windows, macOS, Linux).<br><br>
        Vous pourrez y choisir votre imprimante, régler les options (recto-verso, format A4, etc.) et lancer l'impression.
      </div>
    </div>`;
  // Auto-enable next since no selection needed here
  setTimeout(()=>{ wnext.disabled=false; },100);
}

// init
applyI18n();
</script>
