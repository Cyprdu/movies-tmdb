<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lecteur Live M3U8</title>
    <link rel="icon" type="image/png" href="favico.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body,html{margin:0;padding:0;background:#000;height:100%;font-family:'Roboto',sans-serif;overflow:hidden;color:#fff;user-select:none;-webkit-user-select:none}
        body.hide-cursor{cursor:none!important}
        body.hide-cursor *{cursor:none!important}
        #player-container{position:relative;width:100%;height:100%;background:#000;overflow:hidden}
        video{width:100%;height:100%;display:block;object-fit:contain}
        #click-layer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5}
        #ui-layer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:50;display:flex;flex-direction:column;justify-content:space-between;opacity:0;transition:opacity 0.2s ease-out;pointer-events:none}
        #ui-layer.visible{opacity:1}
        #subtitle-container{position:absolute;width:100%;bottom:100px;display:flex;justify-content:center;pointer-events:none!important;z-index:200;transition:bottom 0.2s ease-out}
        #subtitle-container.controls-visible{bottom:140px}
        #subtitle-container span{font-size:clamp(24px, 4vw, 42px);color:#fff;text-shadow:0 0 8px rgb(0 0 0 / .95),0 0 12px rgb(0 0 0 / .8);background:#fff0;font-weight:500;padding:4px 12px;white-space:pre-line;text-align:center}
        .top-bar{padding:25px 40px;background:linear-gradient(to bottom,rgb(0 0 0 / .8) 0%,transparent 100%);display:flex;justify-content:space-between;align-items:center;position:relative;z-index:100;pointer-events:auto}
        .top-title{position:absolute;left:50%;top:30px;transform:translateX(-50%);font-size:18px;color:#fff;text-shadow:0 1px 4px rgb(0 0 0 / .8);pointer-events:none;font-weight:700}
        .top-icons{display:flex;gap:24px;align-items:center}
        .icon-btn{width:25px;height:25px;color:rgb(255 255 255 / .7);cursor:pointer;transition:transform 0.15s,color 0.15s;display:flex;align-items:center;justify-content:center;position:relative}
        .icon-btn:hover{transform:scale(1.15);color:#fff}
        .icon-btn svg{width:100%;height:100%}
        .volume-container{position:relative;display:flex;flex-direction:column;align-items:center;pointer-events:auto}
        .vol-slider-wrapper{position:absolute;top:36px;width:40px;height:0;background:rgb(30 30 30 / .95);border-radius:4px;transition:height 0.2s ease-out;display:flex;align-items:center;justify-content:center;z-index:200;overflow:hidden;box-shadow:0 4px 12px rgb(0 0 0 / .6)}
        .volume-container:hover .vol-slider-wrapper,.vol-slider-wrapper:hover{height:130px}
        .vol-slider-wrapper input[type=range]{transform:rotate(-90deg);width:100px;height:4px;cursor:pointer}
        .center-controls{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:80px;pointer-events:auto;z-index:60}
        .center-btn{cursor:pointer;transition:transform 0.15s;color:rgb(255 255 255 / .85)}
        .center-btn:hover{transform:scale(1.1);color:#fff}
        .bottom-bar{padding:0 40px 35px 40px;background:linear-gradient(to top,rgb(0 0 0 / .9) 0%,transparent 100%);display:flex;flex-direction:column;gap:10px;pointer-events:auto;z-index:100}
        .time-display{font-size:14px;color:#ccc;display:flex;align-items:center;gap:10px;}
        .live-badge {background-color: #E50914; color: #fff; padding: 2px 8px; border-radius: 4px; font-weight: 700; font-size: 13px; cursor: pointer;}
        .live-badge.not-live {background-color: rgb(255 255 255 / .2); color: #aaa;}
        .seek-container{width:100%;height:4px;background:rgb(255 255 255 / .25);cursor:pointer;position:relative;border-radius:2px}
        .seek-fill{height:100%;background:#fff;width:0%;position:relative}
        .menu-popup{position:absolute;top:70px;right:40px;background:rgb(40 40 40 / .97);border-radius:4px;padding:8px 0;min-width:300px;display:none;flex-direction:column;z-index:2000;pointer-events:auto}
        .menu-header{padding:12px 20px;font-weight:700;border-bottom:1px solid #444}
        .menu-popup button{background:none;border:none;color:#bbb;padding:12px 20px;text-align:left;cursor:pointer;width:100%}
        .menu-popup button.active{color:#fff;font-weight:bold}
        .menu-subtext{display:block;font-size:11px;color:#888}
    </style>
</head>
<body id="main-body">

    <div id="player-container">
        <video id="video" autoplay playsinline></video>
        <div id="subtitle-container"></div>
        <div id="click-layer"></div>
        
        <div id="ui-layer">
            <div class="top-bar">
                <div class="top-left"></div>
                <div class="top-title" id="movie-title">Direct</div>
                <div class="top-icons">
                    <div class="icon-btn" id="subs-btn" title="Audio/Subs">
                        <svg viewBox="0 0 25 25"><path fill="#fff" d="M20.773 2.207h-16a4 4 0 0 0-4 4v12a4 4 0 0 0 4 4h16a4 4 0 0 0 4-4v-12a4 4 0 0 0-4-4zm-16 2a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-12a2 2 0 0 0-2-2h-16z"/></svg>
                    </div>
                    <div class="volume-container">
                        <div class="icon-btn" id="vol-btn"><svg id="vol-icon" viewBox="0 0 25 24"><path stroke="#fff" stroke-width="2" d="M15 20V4L8.115 7.934A.5.5 0 0 1 7.867 8H3.5a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 .5.5h4.367a.5.5 0 0 1 .248.066L15 20z"/></svg></div>
                        <div class="vol-slider-wrapper"><input type="range" min="0" max="1" step="0.05" value="1" id="vol-range"></div>
                    </div>
                    <div class="icon-btn" id="settings-btn"><svg viewBox="0 0 25 25"><path fill="#fff" d="M12.5 15.5a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path fill="#fff" d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1a7.93 7.93 0 0 0-1.69-.98l-.38-2.65A.488.488 0 0 0 14 1h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12.5 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg></div>
                    <div class="icon-btn" id="fullscreen-btn"><svg viewBox="0 0 25 25"><path fill="#fff" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></div>
                </div>
            </div>

            <div class="center-controls">
                <div class="center-btn" id="center-play-btn">
                    <svg id="icon-play" width="67" height="67" viewBox="0 0 67 67"><path fill="#fff" d="M20.28 9.65c-2.205-1.268-4.026-.228-4.026 2.307v43.805c0 2.535 1.82 3.574 4.027 2.307l38.471-21.903a2.514 2.514 0 0 0 0-2.743L20.28 9.65z"/></svg>
                    <svg id="icon-pause" width="67" height="67" viewBox="0 0 67 67" style="display:none"><path fill="#fff" d="M46.332 5.773a4.125 4.125 0 0 0-4.125 4.125v46.75a4.125 4.125 0 0 0 8.25 0V9.898a4.125 4.125 0 0 0-4.125-4.125zM25.707 9.898v46.75a4.125 4.125 0 1 1-8.25 0V9.898a4.125 4.125 0 1 1 8.25 0z"/></svg>
                </div>
            </div>

            <div class="bottom-bar">
                <div class="time-display">
                    <span class="live-badge" id="live-badge-btn">DIRECT</span>
                    <span id="live-offset-text"></span>
                </div>
                <div class="seek-container" id="seek-container">
                    <div class="seek-fill" id="seek-fill"></div>
                </div>
            </div>

            <div class="menu-popup" id="menu-subs"></div>
            <div class="menu-popup" id="menu-settings"></div>
        </div>
    </div>

    <script>
        const MOVIE_CONFIG = {
            "channel_name": "France 2",
            "url": "https://raw.githubusercontent.com/schumijo/iptv/main/playlists/francetv/france2.m3u8"
        };

        const video = document.getElementById('video');
        const uiLayer = document.getElementById('ui-layer');
        const seekFill = document.getElementById('seek-fill');
        const liveBadgeBtn = document.getElementById('live-badge-btn');
        let player, uiTimer;

        async function init() {
            shaka.polyfill.installAll();
            if (shaka.Player.isBrowserSupported()) {
                player = new shaka.Player(video);
                
                // Config spécifique pour M3U8 et flux Live
                player.configure({
                    manifest: {
                        retryParameters: { maxAttempts: 5 }
                    },
                    streaming: {
                        rebufferingGoal: 10,
                        jumpLargeGaps: true
                    }
                });

                player.addEventListener('error', (e) => console.error('Shaka Error:', e.detail));

                try {
                    // Chargement du lien M3U8
                    await player.load(MOVIE_CONFIG.url);
                    document.getElementById('movie-title').textContent = MOVIE_CONFIG.channel_name;
                    showUI();
                } catch (e) {
                    console.error('Load Error:', e);
                }
            }
        }

        // --- UI Logic ---
        function showUI() {
            uiLayer.classList.add('visible');
            clearTimeout(uiTimer);
            if (!video.paused) {
                uiTimer = setTimeout(() => uiLayer.classList.remove('visible'), 5000);
            }
        }

        function togglePlay() {
            if (video.paused) {
                video.play();
                document.getElementById('icon-play').style.display = 'none';
                document.getElementById('icon-pause').style.display = 'block';
            } else {
                video.pause();
                document.getElementById('icon-play').style.display = 'block';
                document.getElementById('icon-pause').style.display = 'none';
            }
            showUI();
        }

        // Retour au direct
        liveBadgeBtn.addEventListener('click', () => {
            const seekRange = player.seekRange();
            video.currentTime = seekRange.end;
        });

        // Update progress bar
        video.ontimeupdate = () => {
            const seekRange = player.seekRange();
            if (seekRange && seekRange.end > 0) {
                const perc = ((video.currentTime - seekRange.start) / (seekRange.end - seekRange.start)) * 100;
                seekFill.style.width = perc + "%";

                // Status Direct
                const isLive = (seekRange.end - video.currentTime) < 15;
                liveBadgeBtn.className = isLive ? 'live-badge' : 'live-badge not-live';
            }
        };

        // Menus Qualité / Audio
        document.getElementById('settings-btn').onclick = () => toggleMenu('menu-settings');
        document.getElementById('subs-btn').onclick = () => toggleMenu('menu-subs');

        function toggleMenu(id) {
            const menu = document.getElementById(id);
            const isVisible = menu.style.display === 'flex';
            document.querySelectorAll('.menu-popup').forEach(m => m.style.display = 'none');
            if (!isVisible) {
                menu.style.display = 'flex';
                buildMenu(id);
            }
        }

        function buildMenu(id) {
            const menu = document.getElementById(id);
            menu.innerHTML = '';
            if (id === 'menu-settings') {
                menu.innerHTML = '<div class="menu-header">Qualité</div>';
                const tracks = player.getVariantTracks().sort((a,b) => b.height - a.height);
                tracks.forEach(t => {
                    const btn = document.createElement('button');
                    btn.innerHTML = `${t.height}p <span class="menu-subtext">${(t.bandwidth/1000000).toFixed(1)} Mbps</span>`;
                    if (t.active) btn.className = 'active';
                    btn.onclick = () => { player.selectVariantTrack(t, true); toggleMenu(id); };
                    menu.appendChild(btn);
                });
            } else {
                menu.innerHTML = '<div class="menu-header">Audio & Langues</div>';
                const languages = player.getAudioLanguages();
                languages.forEach(lang => {
                    const btn = document.createElement('button');
                    btn.textContent = lang.toUpperCase();
                    btn.onclick = () => { player.selectAudioLanguage(lang); toggleMenu(id); };
                    menu.appendChild(btn);
                });
            }
        }

        document.getElementById('click-layer').onclick = togglePlay;
        document.getElementById('center-play-btn').onclick = togglePlay;
        document.getElementById('fullscreen-btn').onclick = () => {
            if (!document.fullscreenElement) document.getElementById('player-container').requestFullscreen();
            else document.exitFullscreen();
        };

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
