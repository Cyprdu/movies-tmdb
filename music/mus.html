      ignoreYoutubeUpdates = true; currentVideoId = savedVid; setTimeout(function() { ignoreYoutubeUpdates = false; }, 3000);
    }
  });

  function addDownloadButton() {
    if (document.getElementById('fsound-dl-btn')) return;
    var nextSvg = document.querySelector('svg[data-testid="MediaNextIcon"]');
    if (!nextSvg) { setTimeout(addDownloadButton, 1000); return; }
    var nextBtn = nextSvg.closest('button');
    if (!nextBtn || !nextBtn.parentElement) return;
    var btn = document.createElement('button');
    btn.id = 'fsound-dl-btn';
    btn.type = 'button';
    btn.title = 'Télécharger';
    btn.className = nextBtn.className;
    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="svg-icon" style="width:1em;height:1em"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
    btn.onclick = function(e) {
      e.stopPropagation(); e.preventDefault();
      if (!currentVideoId) return;
      btn.style.opacity = '0.4'; btn.style.pointerEvents = 'none';
      btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:1em;height:1em;animation:fspin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>';
      var info = getTrackInfo();
      var name = info.title !== 'FSound' ? info.artist + ' - ' + info.title : 'audio';
      var a = document.createElement("a"); a.href = "/audio-stream.php?v=" + currentVideoId + "&dl=1&name=" + encodeURIComponent(name.replace(/[\/\\:*?"<>|]/g, "")); a.click(); setTimeout(resetBtn, 2000);





      function resetBtn() {
        btn.style.opacity = ''; btn.style.pointerEvents = '';
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="svg-icon" style="width:1em;height:1em"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
      }
    };
    nextBtn.parentElement.insertBefore(btn, nextBtn.nextSibling);
  }

  var dlObserver = new MutationObserver(function() {
    if (document.querySelector('svg[data-testid="MediaNextIcon"]') && !document.getElementById('fsound-dl-btn')) addDownloadButton();
  });
  dlObserver.observe(document.documentElement, {childList: true, subtree: true});
})();

<div id="fsound-pwa-toast" role="alert" aria-live="polite">
    <div class="fsound-pwa-text">
        <div class="fsound-pwa-title">Installer FSound ?</div>
        <div class="fsound-pwa-sub">Raccourci sur l'écran d'accueil</div>
    </div>
    <button type="button" class="fsound-pwa-yes">Installer</button>
    <button type="button" class="fsound-pwa-no" aria-label="Fermer">&times;</button>

<script>
(function () {
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
            navigator.serviceWorker.register('/sw.js').catch(function () {});
        });
    }

    var toast = document.getElementById('fsound-pwa-toast');
    if (!toast) return;
    var yesBtn = toast.querySelector('.fsound-pwa-yes');
    var noBtn = toast.querySelector('.fsound-pwa-no');
    var subText = toast.querySelector('.fsound-pwa-sub');

    var isStandalone =
        window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true;
    if (isStandalone) return;

    var ua = navigator.userAgent || '';
    var isIOS = /iphone|ipad|ipod/i.test(ua) && !/Macintosh/.test(ua);
    var deferredPrompt = null;

    var alreadyDismissed = false;
    var lastShown = 0;
    try {
        alreadyDismissed = localStorage.getItem('fsound_pwa_dismissed') === '1';
        lastShown = parseInt(localStorage.getItem('fsound_pwa_last_shown') || '0', 10);
    } catch (e) {}
    if (alreadyDismissed) return;

    var COOLDOWN_MS = 7 * 24 * 60 * 60 * 1000;
    if (Date.now() - lastShown < COOLDOWN_MS) return;

    function showToast(asIOS) {
        if (asIOS) {
            subText.textContent = 'Partager → Sur l’écran d’accueil';
            yesBtn.textContent = 'Voir comment';
        }
        toast.classList.add('show');
        try { localStorage.setItem('fsound_pwa_last_shown', String(Date.now())); } catch (e) {}
    }

    function hideToast() {
        toast.classList.remove('show');
    }

    function dismissPermanent() {
        hideToast();
        try { localStorage.setItem('fsound_pwa_dismissed', '1'); } catch (e) {}
    }

    yesBtn.addEventListener('click', function () {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function (choice) {
                if (choice.outcome === 'accepted') {
                    dismissPermanent();
                }
                deferredPrompt = null;
                hideToast();
            });
        } else if (isIOS) {
            subText.innerHTML = 'Appuyez sur l’icône <strong>Partager</strong> en bas de Safari, puis <strong>"Sur l’écran d’accueil"</strong>.';
            yesBtn.style.display = 'none';
            setTimeout(dismissPermanent, 10000);
        } else {
            hideToast();
        }
    });
    noBtn.addEventListener('click', dismissPermanent);

    window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        deferredPrompt = e;
        showToast(false);
    });

    if (isIOS) {
        setTimeout(function () { showToast(true); }, 4000);
    }

    window.addEventListener('appinstalled', function () {
        dismissPermanent();
        deferredPrompt = null;
    });
})();
</script>
