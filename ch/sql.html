<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL — Cours NSI</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161922;
    --surface2: #1e2330;
    --border: #2a3045;
    --accent: #00e5ff;
    --accent2: #ff6b6b;
    --accent3: #a8ff78;
    --accent4: #ffd166;
    --text: #e8eaf0;
    --text-muted: #7a859a;
    --keyword: #ff79c6;
    --string: #a8ff78;
    --number: #ffd166;
    --comment: #6272a4;
    --success: #50fa7b;
    --error: #ff5555;
    --warning: #ffb86c;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID NOISE BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,15,20,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    height: 60px;
  }

  .logo {
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .logo span { color: var(--text-muted); }

  .tabs {
    display: flex;
    gap: 0.3rem;
    flex: 1;
    overflow-x: auto;
  }

  .tab-btn {
    padding: 0.35rem 1rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .tab-btn.active.tab-ajout { background: var(--accent2); border-color: var(--accent2); }
  .tab-btn.active.tab-param { background: var(--accent4); border-color: var(--accent4); color: #000; }

  /* ─── LAYOUT ─── */
  .app {
    display: flex;
    height: calc(100vh - 60px);
    position: relative;
    z-index: 1;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .sidebar-section {
    padding: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section h3 {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    padding: 0 0.3rem;
  }

  .lesson-btn {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    width: 100%;
    padding: 0.45rem 0.6rem;
    border: none;
    background: transparent;
    color: var(--text-muted);
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    text-align: left;
    transition: all 0.15s;
  }

  .lesson-btn:hover { background: var(--surface2); color: var(--text); }
  .lesson-btn.active { background: rgba(0,229,255,0.12); color: var(--accent); }
  .lesson-btn.done .lesson-num { background: var(--success); color: #000; }

  .lesson-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 22px;
    border-radius: 4px;
    background: var(--surface2);
    font-size: 0.7rem;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .progress-bar-wrap {
    padding: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* MAIN CONTENT */
  .main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .lesson-view { display: none; padding: 2rem; max-width: 900px; width: 100%; }
  .lesson-view.active { display: flex; flex-direction: column; gap: 1.8rem; }

  /* LESSON HEADER */
  .lesson-header { display: flex; flex-direction: column; gap: 0.5rem; }

  .lesson-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }

  .lesson-title {
    font-size: 1.8rem;
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -0.5px;
  }

  .lesson-subtitle {
    color: var(--text-muted);
    font-size: 0.9rem;
    line-height: 1.6;
    max-width: 680px;
  }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .card-header {
    padding: 0.75rem 1.2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .card-header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }
  .card-header .dot.red { background: var(--error); }
  .card-header .dot.green { background: var(--success); }
  .card-header .dot.yellow { background: var(--warning); }

  .card-body { padding: 1.2rem; }

  /* THEORY BOX */
  .theory {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 1.2rem 1.4rem;
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text);
  }

  .theory p + p { margin-top: 0.8rem; }

  .theory .highlight {
    background: rgba(0,229,255,0.1);
    color: var(--accent);
    padding: 0.1em 0.4em;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em;
  }

  /* SCHEMA TABLE */
  .schema-wrap {
    overflow-x: auto;
    border-radius: var(--radius);
  }

  .schema-table {
    border-collapse: collapse;
    width: 100%;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
  }

  .schema-table th {
    background: var(--surface2);
    color: var(--accent);
    padding: 0.6rem 1rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .schema-table td {
    padding: 0.55rem 1rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  .schema-table tr:last-child td { border-bottom: none; }
  .schema-table tr:hover td { background: rgba(255,255,255,0.02); }

  /* SQL EDITOR */
  .sql-editor-wrap {
    background: #0a0c10;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .editor-toolbar {
    padding: 0.6rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .editor-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }

  .editor-actions { display: flex; gap: 0.5rem; }

  .btn {
    padding: 0.4rem 1rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    transition: all 0.15s;
  }

  .btn-run {
    background: var(--accent);
    color: #000;
  }
  .btn-run:hover { background: #00cfea; transform: translateY(-1px); }

  .btn-reset {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-reset:hover { color: var(--text); border-color: var(--text-muted); }

  .btn-hint {
    background: rgba(255,209,102,0.15);
    color: var(--accent4);
    border: 1px solid rgba(255,209,102,0.3);
  }
  .btn-hint:hover { background: rgba(255,209,102,0.25); }

  textarea.sql-input {
    width: 100%;
    min-height: 100px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--accent3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    line-height: 1.6;
    padding: 1rem 1.2rem;
    resize: vertical;
    caret-color: var(--accent);
    tab-size: 2;
  }

  textarea.sql-input::placeholder { color: var(--comment); }

  /* RESULT */
  .result-area {
    min-height: 60px;
    border-top: 1px solid var(--border);
  }

  .result-status {
    padding: 0.7rem 1.2rem;
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .result-status.success { color: var(--success); background: rgba(80,250,123,0.05); }
  .result-status.error { color: var(--error); background: rgba(255,85,85,0.05); }
  .result-status.info { color: var(--text-muted); }

  .result-table-wrap {
    overflow-x: auto;
    padding: 0 1.2rem 1.2rem;
  }

  .result-table {
    border-collapse: collapse;
    width: 100%;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
  }

  .result-table th {
    background: rgba(0,229,255,0.08);
    color: var(--accent);
    padding: 0.5rem 0.9rem;
    text-align: left;
    border: 1px solid var(--border);
    font-weight: 700;
  }

  .result-table td {
    padding: 0.45rem 0.9rem;
    border: 1px solid var(--border);
    color: var(--text);
  }

  .result-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .null-val { color: var(--text-muted); font-style: italic; }

  /* HINT BOX */
  .hint-box {
    display: none;
    margin-top: 0.8rem;
    padding: 0.9rem 1.2rem;
    background: rgba(255,209,102,0.07);
    border: 1px solid rgba(255,209,102,0.25);
    border-radius: var(--radius);
    font-size: 0.85rem;
    color: var(--accent4);
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.5;
  }

  .hint-box.show { display: block; }

  /* SUCCESS BANNER */
  .success-banner {
    display: none;
    padding: 1rem 1.4rem;
    background: rgba(80,250,123,0.08);
    border: 1px solid rgba(80,250,123,0.25);
    border-radius: var(--radius);
    color: var(--success);
    font-weight: 700;
    font-size: 0.9rem;
    align-items: center;
    gap: 0.6rem;
  }
  .success-banner.show { display: flex; }

  /* NAV BOTTOM */
  .lesson-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .btn-nav {
    padding: 0.6rem 1.4rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .btn-nav:hover { border-color: var(--accent); color: var(--accent); }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

  /* WELCOME */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: 3rem;
    text-align: center;
    gap: 1.5rem;
  }

  .welcome-icon { font-size: 4rem; }

  .welcome h1 {
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: -1px;
  }
  .welcome h1 span { color: var(--accent); }

  .welcome p {
    color: var(--text-muted);
    max-width: 500px;
    line-height: 1.7;
    font-size: 1rem;
  }

  .welcome-start {
    padding: 0.8rem 2rem;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
  }
  .welcome-start:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,229,255,0.3); }

  .stats {
    display: flex;
    gap: 2rem;
    margin-top: 1rem;
  }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
  .stat-num { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
  .stat-label { font-size: 0.75rem; color: var(--text-muted); }

  /* KEYWORD CHIP */
  .kw {
    display: inline-block;
    background: rgba(255,121,198,0.12);
    color: var(--keyword);
    padding: 0.1em 0.45em;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em;
    font-weight: 600;
  }

  /* MULTI TABLE SCHEMA */
  .schema-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 1rem; }

  .schema-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .schema-card-title {
    padding: 0.5rem 0.9rem;
    background: rgba(0,229,255,0.07);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
  }

  /* CATEGORY BADGE */
  .cat-badge {
    padding: 0.15em 0.6em;
    border-radius: 4px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .cat-requete { background: rgba(0,229,255,0.15); color: var(--accent); }
  .cat-ajout { background: rgba(255,107,107,0.15); color: var(--accent2); }
  .cat-param { background: rgba(255,209,102,0.15); color: var(--accent4); }

  /* SECTION DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    color: var(--text-muted);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* SCROLLBAR MAIN */
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 768px) {
    .sidebar { width: 200px; min-width: 200px; }
    .lesson-title { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">SQL<span>·</span>NSI</div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchCategory('requete')">🔍 Requête SQL</button>
    <button class="tab-btn tab-ajout" onclick="switchCategory('ajout')">✏️ Ajout SQL</button>
    <button class="tab-btn tab-param" onclick="switchCategory('param')">⚙️ Paramétrage SQL</button>
  </div>
</header>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="progress-bar-wrap">
      <div class="progress-label">
        <span>Progression</span>
        <span id="progress-text">0 / 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div id="lesson-list"></div>
  </aside>

  <main class="main" id="main-content">
    <div class="welcome" id="welcome-screen">
      <div class="welcome-icon">🗄️</div>
      <h1>Cours <span>SQL</span><br>pour le bac NSI</h1>
      <p>Apprends le SQL étape par étape avec des exercices interactifs. Chaque leçon contient une explication claire et un exercice à compléter avec un vrai moteur SQL.</p>
      <div class="stats">
        <div class="stat"><div class="stat-num">47</div><div class="stat-label">Leçons</div></div>
        <div class="stat"><div class="stat-num">3</div><div class="stat-label">Catégories</div></div>
        <div class="stat"><div class="stat-num">100%</div><div class="stat-label">Interactif</div></div>
      </div>
      <button class="welcome-start" onclick="startCourse()">Commencer le cours →</button>
    </div>
    <div id="lesson-container"></div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  DATABASE ENGINE (SQL.js-like simulator)
// ═══════════════════════════════════════════════════════

const DB = {
  tables: {},
  init() {
    // ── TABLE: eleves ──
    this.tables['eleves'] = {
      columns: ['id','nom','prenom','age','classe','moyenne','ville'],
      rows: [
        [1,'Martin','Alice',17,'Terminale',15.5,'Lyon'],
        [2,'Durand','Bob',16,'Première',12.0,'Paris'],
        [3,'Leroy','Charlie',17,'Terminale',18.0,'Lyon'],
        [4,'Petit','Diana',18,'Terminale',9.5,'Marseille'],
        [5,'Moreau','Eve',16,'Première',14.0,'Lyon'],
        [6,'Simon','Frank',17,'Terminale',11.0,'Paris'],
        [7,'Laurent','Grace',18,'Terminale',16.5,'Bordeaux'],
        [8,'Michel','Hugo',15,'Seconde',13.0,'Lyon'],
        [9,'Garcia','Iris',17,'Terminale',null,'Paris'],
        [10,'David','Jules',16,'Première',17.5,'Nantes'],
      ]
    };
    // ── TABLE: matieres ──
    this.tables['matieres'] = {
      columns: ['id','nom_matiere','coefficient','professeur'],
      rows: [
        [1,'Mathématiques',6,'M. Dupont'],
        [2,'NSI',4,'Mme Leclerc'],
        [3,'Physique',6,'M. Bernard'],
        [4,'Français',4,'Mme Rousseau'],
        [5,'Anglais',3,'M. Wilson'],
        [6,'Philosophie',3,'Mme Fontaine'],
        [7,'Histoire-Géo',3,'M. Roux'],
      ]
    };
    // ── TABLE: notes ──
    this.tables['notes'] = {
      columns: ['id','eleve_id','matiere_id','note','date_note'],
      rows: [
        [1,1,1,16,'2024-01-15'],[2,1,2,18,'2024-01-20'],[3,1,3,14,'2024-02-10'],
        [4,2,1,11,'2024-01-15'],[5,2,2,13,'2024-01-20'],[6,2,3,10,'2024-02-10'],
        [7,3,1,19,'2024-01-15'],[8,3,2,20,'2024-01-20'],[9,3,3,17,'2024-02-10'],
        [10,4,1,8,'2024-01-15'],[11,4,2,9,'2024-01-20'],[12,4,3,11,'2024-02-10'],
        [13,5,1,15,'2024-01-15'],[14,5,2,14,'2024-01-20'],
        [15,6,1,10,'2024-01-15'],[16,6,3,12,'2024-02-10'],
        [17,7,1,17,'2024-01-15'],[18,7,2,15,'2024-01-20'],[19,7,3,16,'2024-02-10'],
        [20,8,1,13,'2024-01-15'],[21,9,2,null,'2024-01-20'],
        [22,10,1,18,'2024-01-15'],[23,10,2,19,'2024-01-20'],
      ]
    };
    // ── TABLE: livres ──
    this.tables['livres'] = {

// ═══════════════════════════════════════════════════════
//  QUERY PARSER & EXECUTOR
// ═══════════════════════════════════════════════════════

function executeSQL(sql) {
  try {
    const trimmed = sql.trim().replace(/;$/, '').trim();
    if (!trimmed) throw sqlError("Requête vide.");

    const upper = trimmed.toUpperCase();

    if (upper.startsWith('SELECT')) return execSelect(trimmed);
    if (upper.startsWith('INSERT')) return execInsert(trimmed);
    if (upper.startsWith('UPDATE')) return execUpdate(trimmed);
    if (upper.startsWith('DELETE')) return execDelete(trimmed);
    if (upper.startsWith('CREATE TABLE')) return execCreateTable(trimmed);
    if (upper.startsWith('DROP TABLE')) return execDropTable(trimmed);
    if (upper.startsWith('ALTER TABLE')) return execAlterTable(trimmed);

    throw sqlError(`Commande "${trimmed.split(' ')[0].toUpperCase()}" non reconnue ou non supportée dans ce simulateur.`);
  } catch(e) {
    if (e.isSQLError) return { type:'error', message: e.message };
    return { type:'error', message: `Erreur de syntaxe SQL : ${e.message}` };
  }
}

function sqlError(msg) { const e = new Error(msg); e.isSQLError = true; return e; }

// ─── SELECT ───────────────────────────────────────────
function execSelect(sql) {
  // remove outer SELECT ... for nested
  const isNested = /\(\s*SELECT/i.test(sql);

  // CASE support - simple tokenization
  // We'll parse it carefully

  // Extract parts: SELECT ... FROM ... [INNER JOIN ... ON ...] [WHERE ...] [GROUP BY ...] [ORDER BY ...] [LIMIT ...]
  const re = /^SELECT\s+(.*?)\s+FROM\s+(\w+)(?:\s+(?:AS\s+)?(\w+))?(.*?)$/is;
  const m = sql.match(re);
  if (!m) {
    // maybe SELECT without FROM (e.g. SELECT 1+1) — not supported
    throw sqlError("Syntaxe invalide : SELECT doit être suivi de colonnes et de FROM table.");
  }

  let colsRaw = m[1].trim();
  let tableAlias = { [m[2].toLowerCase()]: m[2].toLowerCase() };
  let mainTable = m[2].toLowerCase();
  let rest = m[4] ? m[4].trim() : '';

  // Get table data
  let tableData = getTable(mainTable);

  // ── JOINs ──
  const joinRe = /((?:LEFT\s+)?(?:INNER\s+)?JOIN)\s+(\w+)(?:\s+(?:AS\s+)?(\w+))?\s+ON\s+(.+?)(?=(?:LEFT\s+)?(?:INNER\s+)?JOIN|WHERE|GROUP\s+BY|ORDER\s+BY|LIMIT|$)/gi;
  const joins = [];
  let joinMatch;
  const restUpper = rest.toUpperCase();
  // find JOIN clauses before WHERE
  const wherePos = restUpper.search(/\bWHERE\b/);
  const joinSearchArea = wherePos >= 0 ? rest.slice(0, wherePos) : rest;

  while ((joinMatch = joinRe.exec(joinSearchArea)) !== null) {
    joins.push({
      type: joinMatch[1].trim().toUpperCase(),
      table: joinMatch[2].toLowerCase(),
      alias: joinMatch[3] ? joinMatch[3].toLowerCase() : joinMatch[2].toLowerCase(),
      condition: joinMatch[4].trim()
    });
    tableAlias[joinMatch[3] ? joinMatch[3].toLowerCase() : joinMatch[2].toLowerCase()] = joinMatch[2].toLowerCase();
  }

  // Build joined rows
  let rows = tableData.rows.map(r => buildRowObj(tableData.columns, r, mainTable));

  for (const join of joins) {
    const joinTable = getTable(join.table);
    const leftIsLeft = join.type.includes('LEFT');
    rows = performJoin(rows, joinTable, join.condition, tableAlias, leftIsLeft, join.table);
  }

  // ── WHERE ──
  let whereClause = extractClause(rest, 'WHERE', ['GROUP BY','ORDER BY','LIMIT','HAVING']);
  if (whereClause) {
    rows = rows.filter(row => evalCondition(whereClause, row, tableAlias));
  }

  // ── GROUP BY ──
  let groupByClause = extractClause(rest, 'GROUP BY', ['ORDER BY','LIMIT','HAVING','WHERE']);
  if (groupByClause) {
    rows = performGroupBy(rows, groupByClause, colsRaw);
  }

  // ── HAVING ──
  let havingClause = extractClause(rest, 'HAVING', ['ORDER BY','LIMIT']);
  if (havingClause) {
    rows = rows.filter(row => evalCondition(havingClause, row, tableAlias));
  }

  // ── SELECT columns (with aggregates, aliases, DISTINCT, CASE) ──
  const isDistinct = /^DISTINCT\s+/i.test(colsRaw);
  if (isDistinct) colsRaw = colsRaw.replace(/^DISTINCT\s+/i, '');

  let { selectedCols, resultRows } = applySelect(colsRaw, rows, tableAlias, !groupByClause);

  // DISTINCT
  if (isDistinct) {
    resultRows = uniqueRows(resultRows);
  }

  // ── ORDER BY ──
  let orderByClause = extractClause(rest, 'ORDER BY', ['LIMIT','HAVING']);
  if (orderByClause) {
    resultRows = performOrderBy(resultRows, orderByClause, selectedCols);
  }

  // ── LIMIT ──
  let limitClause = extractClause(rest, 'LIMIT', []);
  if (limitClause) {
    const n = parseInt(limitClause);
    if (isNaN(n)) throw sqlError(`LIMIT attend un nombre, got "${limitClause}"`);
    resultRows = resultRows.slice(0, n);
  }

  const rowCount = resultRows.length;
  return { type:'select', columns: selectedCols, rows: resultRows, message:`${rowCount} ligne(s) retournée(s)` };
}

function buildRowObj(columns, row, tableName) {
  const obj = {};
  columns.forEach((col, i) => {
    obj[`${tableName}.${col}`] = row[i];
    obj[col] = row[i];
  });
  return obj;
}

function getTable(name) {
  const t = DB.tables[name.toLowerCase()];
  if (!t) throw sqlError(`Table "${name}" introuvable. Tables disponibles : ${Object.keys(DB.tables).join(', ')}`);
  return t;
}

function extractClause(str, keyword, stopKeywords) {
  const kUpper = keyword.toUpperCase();
  const re = new RegExp(`\\b${kUpper}\\b\\s*(.+?)(?=${stopKeywords.map(s=>'\\b'+s.replace(' ','\\s+')+'\\b').join('|')}|$)`, 'i');
  const m = str.match(re);
  return m ? m[1].trim() : null;
}

function performJoin(leftRows, rightTable, condition, aliases, isLeft, rightTableName) {
  const rightRows = rightTable.rows.map(r => buildRowObj(rightTable.columns, r, rightTableName));
  const result = [];
  for (const lrow of leftRows) {
    let matched = false;
    for (const rrow of rightRows) {
      const combined = {...lrow, ...rrow};
      if (evalCondition(condition, combined, aliases)) {
        result.push(combined);
        matched = true;
      }
    }
    if (isLeft && !matched) {
      const nullRight = {};
      rightTable.columns.forEach(c => { nullRight[`${rightTableName}.${c}`] = null; nullRight[c] = null; });
      result.push({...lrow, ...nullRight});
    }
  }
  return result;
}

function evalCondition(cond, row, aliases) {
  // Handle nested: evaluate subqueries
  const condClean = cond.trim();

  // AND / OR splitting (careful with parentheses)
  const orParts = splitTopLevel(condClean, ' OR ');
  if (orParts.length > 1) return orParts.some(p => evalCondition(p.trim(), row, aliases));

  const andParts = splitTopLevel(condClean, ' AND ');
  if (andParts.length > 1) return andParts.every(p => evalCondition(p.trim(), row, aliases));

  // Parentheses
  if (/^\(.*\)$/s.test(condClean)) return evalCondition(condClean.slice(1,-1).trim(), row, aliases);

  // NOT
  if (/^NOT\s+/i.test(condClean)) return !evalCondition(condClean.slice(4).trim(), row, aliases);

  // IS NULL / IS NOT NULL
  if (/\bIS\s+NOT\s+NULL\b/i.test(condClean)) {
    const col = condClean.replace(/\s+IS\s+NOT\s+NULL/i,'').trim();
    return getVal(col, row, aliases) !== null;
  }
  if (/\bIS\s+NULL\b/i.test(condClean)) {
    const col = condClean.replace(/\s+IS\s+NULL/i,'').trim();
    return getVal(col, row, aliases) === null;
  }

  // IN (...)
  const inMatch = condClean.match(/^(.+?)\s+(?:NOT\s+)?IN\s*\((.+)\)$/is);
  if (inMatch) {
    const col = inMatch[1].trim();
    const notIn = /\bNOT\s+IN\b/i.test(condClean);
    const valStr = inMatch[2];
    const isNested2 = /^\s*SELECT\s/i.test(valStr);
    let inVals;
    if (isNested2) {
      const subRes = execSelect(valStr.trim());
      inVals = subRes.rows.map(r => r[0]);
    } else {
      inVals = parseList(valStr);
    }
    const v = getVal(col, row, aliases);
    const inSet = inVals.map(x => typeof x === 'string' ? x.toLowerCase() : x);
    const vComp = typeof v === 'string' ? v.toLowerCase() : v;
    return notIn ? !inSet.includes(vComp) : inSet.includes(vComp);
  }

  // LIKE
  const likeMatch = condClean.match(/^(.+?)\s+(?:NOT\s+)?LIKE\s+('.*?'|".*?")$/i);
  if (likeMatch) {
    const col = likeMatch[1].trim();
    const notLike = /NOT\s+LIKE/i.test(condClean);
    const pattern = likeMatch[2].slice(1,-1);
    const regex = new RegExp('^' + pattern.replace(/%/g,'.*').replace(/_/g,'.') + '$', 'i');
    const v = getVal(col, row, aliases);
    const res = v !== null && regex.test(String(v));
    return notLike ? !res : res;
  }

  // Comparison operators
  const cmpMatch = condClean.match(/^(.+?)\s*(<=|>=|<>|!=|<|>|=)\s*(.+)$/s);
  if (cmpMatch) {
    const lhs = getVal(cmpMatch[1].trim(), row, aliases);
    const op = cmpMatch[2];
    let rhs = parseValue(cmpMatch[3].trim(), row, aliases);
    return compare(lhs, op, rhs);
  }

  return false;
}

function splitTopLevel(str, sep) {
  const parts = [];
  let depth = 0, current = '';
  const upper = str.toUpperCase();
  for (let i = 0; i < str.length; i++) {
    if (str[i] === '(') depth++;
    else if (str[i] === ')') depth--;
    if (depth === 0 && upper.startsWith(sep.toUpperCase(), i)) {
      parts.push(current);
      current = '';
      i += sep.length - 1;
    } else { current += str[i]; }
  }
  parts.push(current);
  return parts.length > 1 ? parts : [str];
}

function getVal(expr, row, aliases) {
  expr = expr.trim();
  // table.column
  const dotMatch = expr.match(/^(\w+)\.(\w+)$/);
  if (dotMatch) {
    const key = `${dotMatch[1].toLowerCase()}.${dotMatch[2].toLowerCase()}`;
    if (key in row) return row[key];
    // alias lookup
    const realT = aliases ? aliases[dotMatch[1].toLowerCase()] : null;
    if (realT) return row[`${realT}.${dotMatch[2].toLowerCase()}`];
    return null;
  }
  // plain column
  if (expr in row) return row[expr];
  const lower = expr.toLowerCase();
  if (lower in row) return row[lower];
  // Check for string literal
  if (/^'.*'$/.test(expr)) return expr.slice(1,-1);
  if (/^".*"$/.test(expr)) return expr.slice(1,-1);
  // number
  if (/^-?\d+(\.\d+)?$/.test(expr)) return parseFloat(expr);
  // function
  return evalExpr(expr, row, aliases);
}

function parseValue(expr, row, aliases) {
  expr = expr.trim();
  if (/^'.*'$/.test(expr)) return expr.slice(1,-1);
  if (/^".*"$/.test(expr)) return expr.slice(1,-1);
  if (/^-?\d+(\.\d+)?$/.test(expr)) return parseFloat(expr);
  if (/^\(SELECT/i.test(expr)) {
    const sub = execSelect(expr.slice(1,-1).trim());
    return sub.rows.length > 0 ? sub.rows[0][0] : null;
  }
  return getVal(expr, row, aliases);
}

function compare(a, op, b) {
  if (a === null || b === null) return false;
  const n1 = typeof a === 'number' ? a : parseFloat(a);
  const n2 = typeof b === 'number' ? b : parseFloat(b);
  const isNum = !isNaN(n1) && !isNaN(n2);
  const l = isNum ? n1 : String(a).toLowerCase();
  const r = isNum ? n2 : String(b).toLowerCase();
  switch(op) {
    case '=': return l == r;
    case '<>': case '!=': return l != r;
    case '<': return l < r;
    case '>': return l > r;
    case '<=': return l <= r;
    case '>=': return l >= r;
  }
  return false;
}

function parseList(str) {
  const items = [];
  let current = '', inStr = false, strChar = '';
  for (const c of str) {
    if (inStr) { if (c === strChar) inStr = false; else current += c; }
    else if (c === "'" || c === '"') { inStr = true; strChar = c; }
    else if (c === ',') { items.push(parseRawVal(current.trim())); current = ''; }
    else current += c;
  }
  if (current.trim()) items.push(parseRawVal(current.trim()));
  return items;
}

function parseRawVal(s) {
  if (/^'.*'$/.test(s)||/^".*"$/.test(s)) return s.slice(1,-1);
  const n = parseFloat(s);
  return isNaN(n) ? s : n;
}

// ── Aggregate functions ──
function applySelect(colsRaw, rows, aliases, allowNonAgg) {
  // Split top-level columns
  const colDefs = splitCols(colsRaw);
  const selectedCols = [];
  const resultRows = [];

  // For aggregate queries (non-grouped)
  const hasAgg = colDefs.some(c => /\b(COUNT|SUM|AVG|MAX|MIN)\s*\(/i.test(c));

  if (hasAgg && rows.length === 0) {
    // return nulls
    colDefs.forEach(cd => { const n = colAlias(cd); selectedCols.push(n.alias || n.expr); });
    resultRows.push(colDefs.map(cd => {
      if (/\bCOUNT\s*\(/i.test(cd)) return 0;
      return null;
    }));
    return { selectedCols, resultRows };
  }

  // For aggregate over all rows (no GROUP BY)
  if (hasAgg && rows[0] && !('__group__' in rows[0])) {
    colDefs.forEach(cd => {
      const {alias, expr} = colAlias(cd);
      selectedCols.push(alias || computeColName(expr));
    });
    const resultRow = colDefs.map(cd => {
      const {expr} = colAlias(cd);
      return computeAgg(expr, rows, aliases);
    });
    resultRows.push(resultRow);
    return { selectedCols, resultRows };
  }

  // Normal / grouped
  colDefs.forEach(cd => {
    const {alias, expr} = colAlias(cd);
    selectedCols.push(alias || computeColName(expr));
  });

  for (const row of rows) {
    const resultRow = colDefs.map(cd => {
      const {expr} = colAlias(cd);
      if (/\b(COUNT|SUM|AVG|MAX|MIN)\s*\(/i.test(expr)) {
        return row['__agg__' + expr.toUpperCase()] !== undefined ? row['__agg__' + expr.toUpperCase()] : computeAgg(expr, [row], aliases);
      }
      return evalExpr(expr, row, aliases);
    });
    resultRows.push(resultRow);
  }
  return { selectedCols, resultRows };
}

function computeColName(expr) {
  if (/^\*$/.test(expr)) return '*';
  const dotMatch = expr.match(/^\w+\.(\w+)$/);
  if (dotMatch) return dotMatch[1];
  return expr.replace(/[^a-zA-Z0-9_]/g, '_').toLowerCase();
}

function colAlias(colDef) {
  const asMatch = colDef.match(/^(.+?)\s+AS\s+['"]?(\w+)['"]?$/i);
  if (asMatch) return { expr: asMatch[1].trim(), alias: asMatch[2] };
  return { expr: colDef.trim(), alias: null };
}

function evalExpr(expr, row, aliases) {
  expr = expr.trim();
  if (expr === '*') return null;

  // CASE WHEN
  if (/^CASE\b/i.test(expr)) return evalCase(expr, row, aliases);

  // SUBSTR/SUBSTRING
  const substrMatch = expr.match(/^SUBSTR(?:ING)?\s*\(\s*(.+?)\s*,\s*(\d+)\s*(?:,\s*(\d+)\s*)?\)$/i);
  if (substrMatch) {
    const val = String(getVal(substrMatch[1].trim(), row, aliases) ?? '');
    const start = parseInt(substrMatch[2]) - 1;
    const len = substrMatch[3] ? parseInt(substrMatch[3]) : undefined;
    return len !== undefined ? val.substr(start, len) : val.substr(start);
  }

  // COALESCE
  const coalMatch = expr.match(/^COALESCE\s*\((.+)\)$/i);
  if (coalMatch) {
    const args = splitCols(coalMatch[1]);
    for (const a of args) {
      const v = getVal(a.trim(), row, aliases);
      if (v !== null && v !== undefined) return v;
    }
    return null;
  }

  // COUNT(*) etc in non-group context
  const aggMatch = expr.match(/^(COUNT|SUM|AVG|MAX|MIN)\s*\(\s*(\*|\w+(?:\.\w+)?)\s*\)$/i);
  if (aggMatch) return computeAgg(expr, [row], aliases);

  // Literal
  if (/^'.*'$/.test(expr)) return expr.slice(1,-1);
  if (/^".*"$/.test(expr)) return expr.slice(1,-1);
  if (/^-?\d+(\.\d+)?$/.test(expr)) return parseFloat(expr);

  return getVal(expr, row, aliases);
}

function evalCase(expr, row, aliases) {
  // CASE WHEN cond THEN val ... ELSE val END
  const withoutCase = expr.replace(/^CASE\s*/i,'').replace(/\s*END$/i,'').trim();
  const elseMatch = withoutCase.match(/^(.*?)\s+ELSE\s+(.+?)$/is);
  let whensPart, elsePart = null;
  if (elseMatch) { whensPart = elseMatch[1]; elsePart = elseMatch[2].trim(); }
  else whensPart = withoutCase;

  const whenRe = /WHEN\s+(.+?)\s+THEN\s+(.+?)(?=\s+WHEN|\s*$)/gi;
  let wm;
  while ((wm = whenRe.exec(whensPart)) !== null) {
    if (evalCondition(wm[1].trim(), row, aliases)) return parseRawVal(wm[2].trim());
  }
  return elsePart ? parseRawVal(elsePart) : null;
}

function computeAgg(expr, rows, aliases) {
  const m = expr.match(/^(COUNT|SUM|AVG|MAX|MIN)\s*\(\s*(\*|DISTINCT\s+\w+(?:\.\w+)?|\w+(?:\.\w+)?)\s*\)$/i);
  if (!m) return null;
  const fn = m[1].toUpperCase();
  const colRaw = m[2].trim();

  if (fn === 'COUNT' && colRaw === '*') return rows.length;

  const isDistinct = /^DISTINCT\s+/i.test(colRaw);
  const colName = isDistinct ? colRaw.replace(/^DISTINCT\s+/i,'').trim() : colRaw;

  let vals = rows.map(r => getVal(colName, r, aliases)).filter(v => v !== null && v !== undefined);
  if (isDistinct) vals = [...new Set(vals)];
  if (vals.length === 0) return fn === 'COUNT' ? 0 : null;

  switch(fn) {
    case 'COUNT': return vals.length;
    case 'SUM': return vals.reduce((a,b)=>a+Number(b),0);
    case 'AVG': { const s = vals.reduce((a,b)=>a+Number(b),0); return Math.round(s/vals.length*100)/100; }
    case 'MAX': return vals.reduce((a,b)=>Number(b)>Number(a)?b:a);
    case 'MIN': return vals.reduce((a,b)=>Number(b)<Number(a)?b:a);
  }
}

function performGroupBy(rows, groupByClause, colsRaw) {
  const groupCols = groupByClause.split(',').map(s=>s.trim());
  const groups = {};
  for (const row of rows) {
    const key = groupCols.map(c => getVal(c, row, {}));
    const keyStr = JSON.stringify(key);
    if (!groups[keyStr]) groups[keyStr] = { rows: [], key, repr: {} };
    groups[keyStr].rows.push(row);
    groupCols.forEach((c,i) => groups[keyStr].repr[c] = key[i]);
  }

  return Object.values(groups).map(g => {
    const baseRow = { ...g.rows[0], '__group__': true };
    // precompute aggregates for all possible agg expressions in select
    const colDefs = splitCols(colsRaw);
    colDefs.forEach(cd => {
      const {expr} = colAlias(cd);
      if (/\b(COUNT|SUM|AVG|MAX|MIN)\s*\(/i.test(expr)) {
        baseRow['__agg__' + expr.toUpperCase()] = computeAgg(expr, g.rows, {});
      }
    });
    return baseRow;
  });
}

function performOrderBy(rows, orderByClause, selectedCols) {
  const orders = orderByClause.split(',').map(s => {
    const parts = s.trim().split(/\s+/);
    return { col: parts[0], dir: (parts[1]||'ASC').toUpperCase() };
  });

  return [...rows].sort((a, b) => {
    for (const ord of orders) {
      const idx = selectedCols.indexOf(ord.col);
      const va = idx >= 0 ? a[idx] : a[ord.col] ?? null;
      const vb = idx >= 0 ? b[idx] : b[ord.col] ?? null;
      if (va === null && vb === null) continue;
      if (va === null) return ord.dir === 'ASC' ? 1 : -1;
      if (vb === null) return ord.dir === 'ASC' ? -1 : 1;
      const na = parseFloat(va), nb = parseFloat(vb);
      const cmp = (!isNaN(na)&&!isNaN(nb)) ? na-nb : String(va).localeCompare(String(vb));
      if (cmp !== 0) return ord.dir === 'ASC' ? cmp : -cmp;
    }
    return 0;
  });
}

function uniqueRows(rows) {
  const seen = new Set();
  return rows.filter(row => {
    const key = JSON.stringify(row);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function splitCols(str) {
  const cols = [];
  let depth = 0, current = '', inStr = false, strChar = '';
  for (const c of str) {
    if (inStr) { if (c === strChar) inStr = false; current += c; continue; }
    if (c === "'" || c === '"') { inStr = true; strChar = c; current += c; continue; }
    if (c === '(') depth++;
    else if (c === ')') depth--;
    if (c === ',' && depth === 0) { cols.push(current.trim()); current = ''; }
    else current += c;
  }
  if (current.trim()) cols.push(current.trim());
  return cols;
}

// ─── INSERT ───────────────────────────────────────────
function execInsert(sql) {
  const m = sql.match(/^INSERT\s+INTO\s+(\w+)\s*(?:\(([^)]+)\))?\s*VALUES\s*\(([^)]+)\)$/is);
  if (!m) throw sqlError("Syntaxe : INSERT INTO table (col1, col2) VALUES (val1, val2)");
  const tableName = m[1].toLowerCase();
  const t = getTable(tableName);
  const colsStr = m[2];
  const valsStr = m[3];
  const vals = parseList(valsStr);

  let cols;
  if (colsStr) {
    cols = colsStr.split(',').map(s=>s.trim());
    if (cols.length !== vals.length) throw sqlError(`${cols.length} colonne(s) spécifiée(s) mais ${vals.length} valeur(s) fournie(s).`);
    // check columns exist
    cols.forEach(c => { if (!t.columns.includes(c)) throw sqlError(`Colonne "${c}" introuvable dans la table "${tableName}".`); });
  } else {
    cols = t.columns;
    if (vals.length !== t.columns.length) throw sqlError(`${t.columns.length} colonne(s) attendue(s) mais ${vals.length} valeur(s) fournie(s).`);
  }

  const newRow = new Array(t.columns.length).fill(null);
  cols.forEach((c, i) => { newRow[t.columns.indexOf(c)] = vals[i]; });
  t.rows.push(newRow);
  return { type:'ok', message:`1 ligne insérée dans "${tableName}".` };
}

// ─── UPDATE ───────────────────────────────────────────
function execUpdate(sql) {
  const m = sql.match(/^UPDATE\s+(\w+)\s+SET\s+(.+?)(?:\s+WHERE\s+(.+))?$/is);
  if (!m) throw sqlError("Syntaxe : UPDATE table SET col = val [WHERE condition]");
  const tableName = m[1].toLowerCase();
  const t = getTable(tableName);
  const setStr = m[2].trim();
  const whereCond = m[3];

  // Parse SET clauses
  const setClauses = setStr.split(',').map(s => {
    const eq = s.indexOf('=');
    if (eq < 0) throw sqlError(`SET invalide : "${s}"`);
    return { col: s.slice(0,eq).trim(), val: parseRawVal(s.slice(eq+1).trim()) };
  });

  setClauses.forEach(({col}) => {
    if (!t.columns.includes(col)) throw sqlError(`Colonne "${col}" introuvable dans la table "${tableName}".`);
  });

  let count = 0;
  t.rows = t.rows.map(row => {
    const rowObj = buildRowObj(t.columns, row, tableName);
    if (!whereCond || evalCondition(whereCond, rowObj, {})) {
      const newRow = [...row];
      setClauses.forEach(({col, val}) => { newRow[t.columns.indexOf(col)] = val; });
      count++;
      return newRow;
    }
    return row;
  });
  return { type:'ok', message:`${count} ligne(s) mise(s) à jour dans "${tableName}".` };
}

// ─── DELETE ───────────────────────────────────────────
function execDelete(sql) {
  const m = sql.match(/^DELETE\s+FROM\s+(\w+)(?:\s+WHERE\s+(.+))?$/is);
  if (!m) throw sqlError("Syntaxe : DELETE FROM table [WHERE condition]");
  const tableName = m[1].toLowerCase();
  const t = getTable(tableName);
  const whereCond = m[2];

  if (!whereCond) {
    const count = t.rows.length;
    t.rows = [];
    return { type:'ok', message:`${count} ligne(s) supprimée(s) de "${tableName}". Table maintenant vide.` };
  }

  const before = t.rows.length;
  t.rows = t.rows.filter(row => {
    const rowObj = buildRowObj(t.columns, row, tableName);
    return !evalCondition(whereCond, rowObj, {});
  });
  const count = before - t.rows.length;
  return { type:'ok', message:`${count} ligne(s) supprimée(s) de "${tableName}".` };
}

// ─── CREATE TABLE ─────────────────────────────────────
function execCreateTable(sql) {
  const m = sql.match(/^CREATE\s+TABLE\s+(?:IF\s+NOT\s+EXISTS\s+)?(\w+)\s*\((.+)\)$/is);
  if (!m) throw sqlError("Syntaxe : CREATE TABLE nom (col1 TYPE, col2 TYPE, ...)");
  const tableName = m[1].toLowerCase();
  if (DB.tables[tableName]) throw sqlError(`La table "${tableName}" existe déjà.`);
  const colDefs = m[2].split(',').map(s=>s.trim());
  const cols = [];
  for (const def of colDefs) {
    if (/^PRIMARY\s+KEY\s*\(/i.test(def)||/^FOREIGN\s+KEY/i.test(def)||/^CONSTRAINT/i.test(def)) continue;
    const parts = def.split(/\s+/);
    if (parts[0]) cols.push(parts[0].replace(/[`"']/g,''));
  }
  if (cols.length === 0) throw sqlError("Aucune colonne valide définie.");
  DB.tables[tableName] = { columns: cols, rows: [] };
  return { type:'ok', message:`Table "${tableName}" créée avec ${cols.length} colonne(s) : ${cols.join(', ')}.` };
}

// ─── DROP TABLE ───────────────────────────────────────
function execDropTable(sql) {
  const m = sql.match(/^DROP\s+TABLE\s+(?:IF\s+EXISTS\s+)?(\w+)$/is);
  if (!m) throw sqlError("Syntaxe : DROP TABLE nom_table");
  const tableName = m[1].toLowerCase();
  if (!DB.tables[tableName]) throw sqlError(`La table "${tableName}" n'existe pas.`);
  delete DB.tables[tableName];
  return { type:'ok', message:`Table "${tableName}" supprimée avec succès.` };
}

// ─── ALTER TABLE ──────────────────────────────────────
function execAlterTable(sql) {
  const addMatch = sql.match(/^ALTER\s+TABLE\s+(\w+)\s+ADD\s+(?:COLUMN\s+)?(\w+)\s+(\w+)/i);
  const dropMatch = sql.match(/^ALTER\s+TABLE\s+(\w+)\s+DROP\s+(?:COLUMN\s+)?(\w+)/i);
  const fkMatch = sql.match(/^ALTER\s+TABLE\s+(\w+)\s+ADD\s+(?:CONSTRAINT\s+\w+\s+)?FOREIGN\s+KEY\s*\((\w+)\)\s+REFERENCES\s+(\w+)\s*\((\w+)\)/i);

  if (fkMatch) {
    const t1 = fkMatch[1].toLowerCase(), col = fkMatch[2], t2 = fkMatch[3].toLowerCase(), refCol = fkMatch[4];
    getTable(t1); getTable(t2);
    return { type:'ok', message:`Clé étrangère ajoutée : "${t1}.${col}" → "${t2}.${refCol}". (Contrainte simulée, intégrité non forcée en mode démo.)` };
  }

  if (addMatch) {
    const tableName = addMatch[1].toLowerCase();
    const t = getTable(tableName);
    const colName = addMatch[2];
    if (t.columns.includes(colName)) throw sqlError(`La colonne "${colName}" existe déjà dans "${tableName}".`);
    t.columns.push(colName);
    t.rows = t.rows.map(r => [...r, null]);
    return { type:'ok', message:`Colonne "${colName}" ajoutée à "${tableName}".` };
  }

  if (dropMatch) {
    const tableName = dropMatch[1].toLowerCase();
    const t = getTable(tableName);
    const colName = dropMatch[2];
    const idx = t.columns.indexOf(colName);
    if (idx < 0) throw sqlError(`Colonne "${colName}" introuvable dans "${tableName}".`);
    t.columns.splice(idx,1);
    t.rows = t.rows.map(r => { const nr=[...r]; nr.splice(idx,1); return nr; });
    return { type:'ok', message:`Colonne "${colName}" supprimée de "${tableName}".` };
  }

  throw sqlError("Syntaxe ALTER TABLE non reconnue. Essayez : ALTER TABLE nom ADD colonne TYPE ou DROP colonne.");
}

      exercise: `Affiche les noms et notes des élèves de <strong>Terminale</strong> uniquement (jointure + WHERE).`,
      hint: `SELECT eleves.nom, notes.note FROM eleves INNER JOIN notes ON eleves.id = notes.eleve_id WHERE eleves.classe = 'Terminale';`,

    {
      id:'r24', num:24, title:'LEFT JOIN', tag:'Requête SQL',
      theory:`<span class="highlight">LEFT JOIN</span> retourne TOUTES les lignes de la table de gauche, même si aucune correspondance n'est trouvée dans la table de droite (dans ce cas les colonnes de droite valent NULL) :<br><br><code style="font-family:var(--font-mono);color:var(--accent3)">SELECT ... FROM t1 LEFT JOIN t2 ON t1.id = t2.fk;</code>`,
      tables: ['eleves','notes'],
      exercise: `Affiche tous les élèves et leurs notes (s'ils en ont). Utilise un <strong>LEFT JOIN</strong> pour inclure les élèves sans notes.`,

      validate: (res) => res.type === 'select',
    },
    {
      id:'r25', num:25, title:'Alias de table', tag:'Requête SQL',
      theory:`Un alias permet de donner un nom raccourci à une table pour simplifier la requête. On utilise le mot-clé <span class="highlight">AS</span> (optionnel) :<br><br><code style="font-family:var(--font-mono);color:var(--accent3)">SELECT e.nom FROM eleves AS e;</code><br>ou plus court :<br><code style="font-family:var(--font-mono);color:var(--accent3)">SELECT e.nom FROM eleves e;</code>`,

      tables: ['eleves'],
      exercise: `Affiche le <strong>nom</strong> (alias "Élève") et la <strong>moyenne</strong> (alias "Note_Moy") de la table eleves.`,

    {
      id:'r27', num:27, title:'Self Join', tag:'Requête SQL',

      exercise: `Affiche les paires d'élèves habitant dans la <strong>même ville</strong> (self join sur <strong>eleves</strong>, condition : même ville ET ids différents). Affiche <code>a.nom</code> et <code>b.nom</code>.`,
      hint: `SELECT a.nom, b.nom FROM eleves a INNER JOIN eleves b ON a.ville = b.ville WHERE a.id < b.id;`,

      id:'r28', num:28, title:'LIKE', tag:'Requête SQL',

      id:'r29', num:29, title:'CASE', tag:'Requête SQL',

      id:'r30', num:30, title:'SUBSTR', tag:'Requête SQL',

      tables: ['eleves'],
      exercise: `Affiche le nom de tous les élèves et leur moyenne, en remplaçant les valeurs NULL par <strong>0</strong> grâce à COALESCE.`,

// ═══════════════════════════════════════════════════════
//  UI STATE
// ═══════════════════════════════════════════════════════

let currentCategory = 'requete';
let currentLessonId = null;
let completedLessons = JSON.parse(localStorage.getItem('sql_completed') || '{}');

function saveProgress() {
  localStorage.setItem('sql_completed', JSON.stringify(completedLessons));
}

function switchCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.remove('active'));
  const idx = ['requete','ajout','param'].indexOf(cat);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  buildSidebar();
  document.getElementById('welcome-screen').style.display = 'none';
  if (currentLessonId) {
    const lessons = LESSONS[cat];
    if (!lessons.find(l=>l.id===currentLessonId)) {
      currentLessonId = null;
    }
  }
  if (!currentLessonId) showWelcome();
  else renderLesson(currentLessonId);
}

function buildSidebar() {
  const lessons = LESSONS[currentCategory];
  const list = document.getElementById('lesson-list');
  list.innerHTML = '';

  const sect = document.createElement('div');
  sect.className = 'sidebar-section';

  const catNames = {requete:'Requêtes SQL', ajout:'Ajout & Modification', param:'Paramétrage'};
  sect.innerHTML = `<h3>${catNames[currentCategory]}</h3>`;

  lessons.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lesson-btn' + (l.id === currentLessonId ? ' active' : '') + (completedLessons[l.id] ? ' done' : '');
    btn.innerHTML = `<span class="lesson-num">${completedLessons[l.id] ? '✓' : l.num}</span> ${l.title}`;
    btn.onclick = () => renderLesson(l.id);
    sect.appendChild(btn);
  });

  list.appendChild(sect);
  updateProgress();
}

function updateProgress() {
  const lessons = LESSONS[currentCategory];
  const done = lessons.filter(l=>completedLessons[l.id]).length;
  const total = lessons.length;
  document.getElementById('progress-text').textContent = `${done} / ${total}`;
  document.getElementById('progress-fill').style.width = `${total>0?done/total*100:0}%`;
}

function showWelcome() {
  document.getElementById('welcome-screen').style.display = 'flex';
  document.getElementById('lesson-container').innerHTML = '';
}

function startCourse() {
  const first = LESSONS[currentCategory][0];
  renderLesson(first.id);
}

function renderLesson(id) {
  // Reset DB to snapshot for clean state
  for (const [t,d] of Object.entries(dbSnapshot)) {
    DB.tables[t] = { columns:[...d.columns], rows: d.rows.map(r=>[...r]) };
  }

  const lessons = LESSONS[currentCategory];
  const lesson = lessons.find(l=>l.id===id);
  if (!lesson) return;

  currentLessonId = id;
  document.getElementById('welcome-screen').style.display = 'none';

  const idx = lessons.indexOf(lesson);
  const prevLesson = idx > 0 ? lessons[idx-1] : null;
  const nextLesson = idx < lessons.length-1 ? lessons[idx+1] : null;

  // Update sidebar
  document.querySelectorAll('.lesson-btn').forEach((b,i) => {
    b.classList.toggle('active', lessons[i] && lessons[i].id === id);
  });

  // Build tables HTML
  const tablesHTML = lesson.tables.length > 0 ? buildTablesHTML(lesson.tables) : '';

  const catClass = {requete:'cat-requete', ajout:'cat-ajout', param:'cat-param'}[currentCategory];

  const container = document.getElementById('lesson-container');
  container.innerHTML = `
    <div class="lesson-view active" id="lv_${id}">
      <div class="lesson-header">
        <div class="lesson-tag">
          <span class="cat-badge ${catClass}">${lesson.tag}</span>
          &nbsp;Leçon ${lesson.num}
        </div>
        <h1 class="lesson-title">${lesson.title}</h1>
      </div>

      <!-- THEORY -->
      <div class="card">
        <div class="card-header"><div class="dot"></div> Cours</div>
        <div class="card-body">
          <div class="theory">${lesson.theory}</div>
        </div>
      </div>

      ${tablesHTML ? `
      <!-- TABLES -->
      <div class="card">
        <div class="card-header"><div class="dot yellow"></div> Tables disponibles</div>
        <div class="card-body">${tablesHTML}</div>
      </div>` : ''}

      <!-- EXERCISE -->
      <div class="card">
        <div class="card-header"><div class="dot green"></div> Exercice</div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:1rem;">
          <div style="font-size:0.9rem;line-height:1.7;color:var(--text)">${lesson.exercise}</div>

          <div class="sql-editor-wrap">
            <div class="editor-toolbar">
              <span class="editor-label">✦ Éditeur SQL</span>
              <div class="editor-actions">
                <button class="btn btn-hint" onclick="toggleHint('${id}')">💡 Indice</button>
                <button class="btn btn-reset" onclick="resetEditor('${id}')">↺ Réinitialiser</button>
                <button class="btn btn-run" onclick="runQuery('${id}')">▶ Exécuter</button>
              </div>
            </div>
            <textarea class="sql-input" id="input_${id}" placeholder="-- Écris ta requête SQL ici..." onkeydown="handleKeydown(event, '${id}')"></textarea>
            <div class="result-area" id="result_${id}">
              <div class="result-status info">En attente d'une requête...</div>
            </div>
          </div>

          <div class="hint-box" id="hint_${id}">💡 Indice : <code>${lesson.hint}</code></div>
          <div class="success-banner" id="success_${id}">✅ Excellente requête ! Leçon validée, tu peux passer à la suivante.</div>
        </div>
      </div>

      <!-- NAVIGATION -->
      <div class="lesson-nav">
        <button class="btn-nav" ${!prevLesson?'disabled':''} onclick="renderLesson('${prevLesson?.id}')">← Précédent</button>
        <span style="font-size:0.75rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;">${idx+1} / ${lessons.length}</span>
        <button class="btn-nav" ${!nextLesson?'disabled':''} onclick="renderLesson('${nextLesson?.id}')">Suivant →</button>
      </div>
    </div>
  `;

  // Re-show success if already done
  if (completedLessons[id]) {
    const s = document.getElementById(`success_${id}`);
    if (s) s.classList.add('show');
  }
}

function buildTablesHTML(tableNames) {
  const available = tableNames.filter(n => DB.tables[n]);
  if (available.length === 0) return '';

  if (available.length === 1) {
    return buildTableHTML(available[0]);
  }

  return `<div class="schema-grid">${available.map(t => buildTableHTMLCompact(t)).join('')}</div>`;
}

function buildTableHTML(name) {
  const t = DB.tables[name];
  if (!t) return '';
  const preview = t.rows.slice(0,4);
  return `
    <div class="schema-wrap">
      <div style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--accent);margin-bottom:0.4rem;font-weight:700;">TABLE: ${name.toUpperCase()}</div>
      <table class="schema-table">
        <thead><tr>${t.columns.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
        <tbody>${preview.map(r=>`<tr>${r.map(v=>`<td>${v===null?'<span class="null-val">NULL</span>':v}</td>`).join('')}</tr>`).join('')}
        ${t.rows.length>4?`<tr><td colspan="${t.columns.length}" style="color:var(--text-muted);font-style:italic;text-align:center;padding:0.4rem">... ${t.rows.length-4} autres lignes</td></tr>`:''}
        </tbody>
      </table>
    </div>`;
}

function buildTableHTMLCompact(name) {
  const t = DB.tables[name];
  if (!t) return '';
  const preview = t.rows.slice(0,3);
  return `
    <div class="schema-card">
      <div class="schema-card-title">TABLE: ${name.toUpperCase()}</div>
      <table class="schema-table">
        <thead><tr>${t.columns.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
        <tbody>${preview.map(r=>`<tr>${r.map(v=>`<td>${v===null?'<span class="null-val">NULL</span>':v}</td>`).join('')}</tr>`).join('')}
        ${t.rows.length>3?`<tr><td colspan="${t.columns.length}" style="color:var(--text-muted);text-align:center;font-style:italic;padding:0.3rem">+${t.rows.length-3} lignes</td></tr>`:''}
        </tbody>
      </table>
    </div>`;
}

function handleKeydown(e, id) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    runQuery(id);
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target;
    const s = ta.selectionStart;
    ta.value = ta.value.slice(0,s) + '  ' + ta.value.slice(ta.selectionEnd);
    ta.selectionStart = ta.selectionEnd = s+2;
  }
}

function toggleHint(id) {
  const hint = document.getElementById(`hint_${id}`);
  hint.classList.toggle('show');
}

function resetEditor(id) {
  document.getElementById(`input_${id}`).value = '';
  document.getElementById(`result_${id}`).innerHTML = '<div class="result-status info">En attente d\'une requête...</div>';
  document.getElementById(`hint_${id}`).classList.remove('show');
}

function runQuery(id) {
  const input = document.getElementById(`input_${id}`);
  const resultDiv = document.getElementById(`result_${id}`);
  const sql = input.value.trim();

  if (!sql) {
    resultDiv.innerHTML = '<div class="result-status error">⚠ La requête est vide.</div>';
    return;
  }

  const result = executeSQL(sql);
  renderResult(resultDiv, result);

  // Validate
  const lesson = [...LESSONS.requete,...LESSONS.ajout,...LESSONS.param].find(l=>l.id===id);
  if (lesson && result.type !== 'error') {
    try {
      if (lesson.validate(result)) {
        completedLessons[id] = true;
        saveProgress();
        buildSidebar();
        const banner = document.getElementById(`success_${id}`);
        if (banner) banner.classList.add('show');
      }
    } catch(e) {}
  }
}

function renderResult(div, result) {
  if (result.type === 'error') {
    div.innerHTML = `<div class="result-status error">❌ ERREUR SQL : ${escHtml(result.message)}</div>`;
    return;
  }
  if (result.type === 'ok') {
    div.innerHTML = `<div class="result-status success">✓ ${escHtml(result.message)}</div>`;
    return;
  }
  if (result.type === 'select') {
    let html = `<div class="result-status success">✓ ${escHtml(result.message)}</div>`;
    if (result.rows.length > 0) {
      html += `<div class="result-table-wrap"><table class="result-table">
        <thead><tr>${result.columns.map(c=>`<th>${escHtml(String(c))}</th>`).join('')}</tr></thead>
        <tbody>${result.rows.map(r=>`<tr>${r.map(v=>`<td>${v===null?'<span class="null-val">NULL</span>':escHtml(String(v))}</td>`).join('')}</tr>`).join('')}</tbody>
      </table></div>`;
    }
    div.innerHTML = html;
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════

buildSidebar();
showWelcome();

</script>
</body>
