<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Intégré</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #host-frame { width: 100%; height: 100%; border: none; }
        #overlay-player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <iframe id="host-frame" src="https://fcikz.space/"></iframe>

    <div id="overlay-player">
        <video id="video" controls></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const video = document.getElementById('video');
        const m3u8Url = 'https://cr7.maximilienlegoat.xyz/hls/9xayPNWxo9nKpZEpAIjLK_D4kY01fdSJ/ee4af9c9-8888-4932-95e9-943c878e6650/20718/20718.m3u8';

        if (Hls.isSupported()) {
            const hls = new Hls({
                xhrSetup: function (xhr, url) {
                    // On essaie de forcer le referer si possible via JS
                    // Note: Le navigateur protège souvent cet en-tête
                }
            });
            hls.loadSource(m3u8Url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = m3u8Url;
        }
    </script>
</body>
</html>
